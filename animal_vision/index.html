<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="카메라로 사진을 찍으면 벌, 뱀, 나비, 개 등 동물의 눈으로 세상을 보여주는 시각 시뮬레이터">
  <title>🌈 Animal Vision — 동물의 눈으로 보는 세상</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌈</text></svg>">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-container">

    <!-- ═══════════════════════════════════════════
         HOME SCREEN — 시작 화면
         ═══════════════════════════════════════════ -->
    <div id="screen-home" class="screen active">
      <div class="home-content">
        <div class="home-logo" aria-hidden="true">🌈</div>
        <h1 class="home-title">Animal Vision</h1>
        <p class="home-subtitle">
          사진을 찍고 동물의 눈으로 세상을 경험하세요.<br>
          벌, 뱀, 나비… 그들은 어떤 색을 볼까요?
        </p>

        <div class="home-animals-preview" aria-hidden="true">
          <div class="preview-chip"><span>🐝</span><span>벌</span></div>
          <div class="preview-chip"><span>🐍</span><span>뱀</span></div>
          <div class="preview-chip"><span>🦋</span><span>나비</span></div>
          <div class="preview-chip"><span>🐕</span><span>개</span></div>
          <div class="preview-chip"><span>🦐</span><span>갯가재</span></div>
        </div>

        <div class="home-actions">
          <button id="btn-camera" class="btn-primary" aria-label="카메라로 촬영하기">
            <span class="btn-icon">📷</span>
            카메라로 촬영하기
          </button>
          <button id="btn-gallery" class="btn-secondary" aria-label="갤러리에서 선택">
            <span class="btn-icon">🖼️</span>
            갤러리에서 선택
          </button>
        </div>

        <!-- 숨겨진 파일 입력 -->
        <input type="file" id="file-input" accept="image/*" aria-hidden="true">
      </div>
    </div>


    <!-- ═══════════════════════════════════════════
         CAMERA SCREEN — 카메라 화면
         ═══════════════════════════════════════════ -->
    <div id="screen-camera" class="screen">
      <div class="camera-view">
        <video id="camera-video" autoplay playsinline muted></video>

        <div class="camera-overlay">
          <!-- 상단 바 -->
          <div class="camera-top-bar">
            <button id="btn-camera-back" class="btn-camera-action" aria-label="뒤로가기">
              <div class="btn-icon-circle">←</div>
              <span class="btn-label">뒤로</span>
            </button>
            <button id="btn-flip" class="btn-camera-action" aria-label="카메라 전환">
              <div class="btn-icon-circle">🔄</div>
              <span class="btn-label">전면</span>
            </button>
          </div>

          <!-- 하단 바 -->
          <div class="camera-bottom-bar">
            <button id="btn-capture" class="btn-camera-action" aria-label="촬영">
              <div class="capture-ring">
                <div class="capture-inner"></div>
              </div>
            </button>
          </div>
        </div>

        <!-- 셔터 플래시 효과 -->
        <div id="shutter-flash"></div>
      </div>
    </div>


    <!-- ═══════════════════════════════════════════
         RESULT SCREEN — 결과 화면
         ═══════════════════════════════════════════ -->
    <div id="screen-result" class="screen">

      <!-- 상단 바 -->
      <div class="result-top-bar">
        <button id="btn-back" class="btn-icon" aria-label="뒤로가기">←</button>
        <div class="result-title">
          <span>🌈</span> Animal Vision
        </div>
        <div class="result-actions">
          <button id="btn-info-toggle" class="btn-icon" aria-label="동물 정보 보기">ℹ️</button>
          <button id="btn-download" class="btn-icon" aria-label="이미지 저장">💾</button>
        </div>
      </div>

      <!-- 이미지 결과 -->
      <div class="result-image-area">
        <canvas id="result-canvas"></canvas>
      </div>

      <!-- 비교 슬라이더 -->
      <div class="compare-section">
        <div class="compare-row">
          <span class="compare-label">사람</span>
          <input type="range" id="compare-slider" min="0" max="100" value="100"
                 aria-label="원본과 변환 이미지 비교">
          <span class="compare-label">동물</span>
        </div>
      </div>

      <!-- 동물 선택 바 -->
      <div class="animal-bar-container">
        <div id="animal-bar" role="tablist" aria-label="동물 선택">
          <!-- JS에서 동적 생성 -->
        </div>
      </div>

      <!-- 하단 액션 -->
      <div class="result-bottom-bar">
        <button id="btn-retake" class="btn-action" aria-label="다시 촬영">
          <span>📷</span> 다시 촬영
        </button>
      </div>

      <!-- 동물 정보 패널 (드래그 업 시트) -->
      <div id="animal-info" role="complementary" aria-label="선택된 동물 시각 정보">
        <!-- JS에서 동적 생성 -->
      </div>
    </div>

    <!-- 에러 메시지 -->
    <div id="error-message" role="alert"></div>

    <!-- 이미지 처리용 숨겨진 캔버스 -->
    <canvas id="process-canvas" style="display:none;"></canvas>

  </div>

  <!-- Scripts -->
  <script src="js/animals.js"></script>
  <script src="js/vision.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
