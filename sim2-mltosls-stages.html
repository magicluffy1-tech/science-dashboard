<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>체세포 분열 단계별 관찰 시뮬레이션</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body {
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    }
  </style>
</head>
<body class="bg-[#06091c] text-[#d2e6ff]">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ══════════════════════════════════════════════════
       체세포 분열 단계별 관찰 데이터 정의
    ══════════════════════════════════════════════════ */
    const STAGES = [
      {
        key: "interphase",
        label: "간기",
        en: "Interphase",
        title: "간기 — DNA 복제로 염색사가 2배로",
        desc: "핵막과 핵소체가 뚜렷하고, 유전 물질은 가늘고 긴 실 모양(염색사)으로 핵 전체에 풀어져 있습니다. 이 시기에 DNA가 복제되어 유전 정보가 똑같은 가닥을 하나 더 만들어냅니다.",
        chromCount: "4개",
        chromatidCount: "8가닥",
        countNotice: "분열 전 세포 기준 (염색사 형태)",
      },
      {
        key: "prophase",
        label: "전기",
        en: "Prophase",
        title: "전기 — 염색체와 동원체의 등장",
        desc: "풀어져 있던 염색사가 굵고 짧게 응축되면서 나비(X) 모양의 염색체로 뚜렷하게 나타납니다. 각 염색체는 복제된 2개의 자매염색분체가 '동원체 1개'에 단단히 결합해 있는 상태입니다. 동원체 수가 4개이므로 염색체는 4개입니다.",
        chromCount: "4개",
        chromatidCount: "8개",
        countNotice: "자매염색분체 결합 상태 (동원체 수 = 4개)",
      },
      {
        key: "metaphase",
        label: "중기",
        en: "Metaphase",
        title: "중기 — 적도면 정렬과 최적의 관찰",
        desc: "핵막이 완전히 사라지고, 세포 중앙(적도면)에 염색체들이 한 줄로 나란히 정렬합니다. 방추사가 각 염색체의 동원체에 결합하며, 염색체의 모양과 수를 카운트하기 가장 좋은 시기입니다.",
        chromCount: "4개",
        chromatidCount: "8개",
        countNotice: "세포 중앙에 1줄 정렬 (동원체 수 = 4개)",
      },
      {
        key: "anaphase",
        label: "후기",
        en: "Anaphase",
        title: "후기 — 동원체 분리, 염색체 수 일시적 2배",
        desc: "방추사가 당겨지면서 하나의 동원체 물질이 반으로 쪼개집니다! 붙어 있던 자매염색분체가 분리되어 양극으로 이동하며, 이제 각각 독립된 동원체를 가졌으므로 세포 전체의 염색체 수는 일시적으로 2배(8개)가 됩니다.",
        chromCount: "8개",
        chromatidCount: "-(분리됨)",
        countNotice: "동원체가 반으로 쪼개져 각각 독립 (동원체 수 = 8개)",
      },
      {
        key: "telophase",
        label: "말기",
        en: "Telophase",
        title: "말기 — 딸핵 형성 및 세포질 분열",
        desc: "양극에 도달한 염색체 주위로 새로운 핵막이 형성되고, 염색체는 다시 염색사로 풀어집니다. 세포 중앙이 잘록하게 조여들며 유전 정보가 완전히 동일한 2개의 딸세포가 완성됩니다.",
        chromCount: "각 4개",
        chromatidCount: "각 4가닥",
        countNotice: "나뉘어진 딸세포 1개 기준 (동원체 수 = 각 4개)",
      },
    ];

    const CHROMOSOMES = [
      { id: "A1", color: "#ef4444" },
      { id: "A2", color: "#fca5a5" },
      { id: "B1", color: "#3b82f6" },
      { id: "B2", color: "#93c5fd" },
    ];

    const THREAD_D =
      "M-20,-5 C-15,-15 -5,-15 0,-5 C5,5 15,5 20,-5 C25,-15 15,-20 5,-15" +
      " C-5,-10 -15,5 -25,15 C-30,20 -20,25 -10,20 C-2,15 8,18 15,25";

    const PAIR_SCALE = { A1: 1.1, A2: 1.1, B1: 0.85, B2: 0.85 };

    const POS = {
      interphase: {
        A1: { x: 115, y: 115, rot: 15 },
        A2: { x: 185, y: 120, rot: -25 },
        B1: { x: 120, y: 185, rot: 35 },
        B2: { x: 180, y: 175, rot: -10 },
      },
      prophase: {
        A1: { x: 110, y: 110, rot: 20, form: "x", scale: PAIR_SCALE.A1 },
        A2: { x: 190, y: 115, rot: -30, form: "x", scale: PAIR_SCALE.A2 },
        B1: { x: 115, y: 190, rot: 40, form: "x", scale: PAIR_SCALE.B1 },
        B2: { x: 185, y: 180, rot: -15, form: "x", scale: PAIR_SCALE.B2 },
      },
      metaphase: {
        A1: { x: 90, y: 150, rot: 0, form: "x", scale: PAIR_SCALE.A1 },
        A2: { x: 130, y: 150, rot: 0, form: "x", scale: PAIR_SCALE.A2 },
        B1: { x: 170, y: 150, rot: 0, form: "x", scale: PAIR_SCALE.B1 },
        B2: { x: 210, y: 150, rot: 0, form: "x", scale: PAIR_SCALE.B2 },
      },
    };

    function buildSplitPos(yNorth, ySouth, rotN = 0, rotS = 0) {
      const xs = { A1: 90, A2: 130, B1: 170, B2: 210 };
      const out = {};
      Object.keys(xs).forEach((id) => {
        const color = CHROMOSOMES.find((c) => c.id === id).color;
        out[id + "-N"] = { x: xs[id], y: yNorth, rot: rotN, form: "rod", color, scale: PAIR_SCALE[id], dir: "N" };
        out[id + "-S"] = { x: xs[id], y: ySouth, rot: rotS, form: "rod", color, scale: PAIR_SCALE[id], dir: "S" };
      });
      return out;
    }
    const SPLIT_POS = {
      anaphase: buildSplitPos(95, 205, 0, 180),
      telophase: buildSplitPos(65, 235, 0, 180),
    };

    const CENTROSOME_POS = {
      prophase: { top: { x: 150, y: 98 }, bottom: { x: 150, y: 202 } },
      metaphase: { top: { x: 150, y: 35 }, bottom: { x: 150, y: 265 } },
      anaphase: { top: { x: 150, y: 25 }, bottom: { x: 150, y: 275 } },
    };

    const FRAG_ANGLES = [0, 45, 90, 135, 180, 225, 270, 315];
    const SCATTER_EXTRA = [8, -6, 14, 0, 9, -11, 5, 13];

    /* ── 컴포넌트 분리 구현 ── */
    function ChromatinTerritory({ x, y, rot, color, doubled }) {
      const [pulse, setPulse] = useState(false);
      const prevDoubled = useRef(false);

      useEffect(() => {
        if (doubled && !prevDoubled.current) {
          setPulse(true);
          const t = setTimeout(() => setPulse(false), 1150);
          return () => clearTimeout(t);
        }
        prevDoubled.current = doubled;
      }, [doubled]);

      return (
        <g style={{ transform: `translate(${x}px, ${y}px) rotate(${rot}deg)`, transition: "transform 1s ease" }}>
          <circle r={pulse ? 5 : 32} opacity={pulse ? 0.9 : 0} fill="none" stroke={color} strokeWidth="2.5" style={{ transition: "r 1.15s ease-out, opacity 1.15s ease-out" }} />
          <g style={{ transform: doubled ? "translate(-8px,-6px)" : "translate(0px,0px)", transition: "transform 1s cubic-bezier(.4,1,.5,1)" }}>
            <path d={THREAD_D} fill="none" stroke={color} strokeWidth="2.8" strokeLinecap="round" opacity="0.75" />
          </g>
          <g style={{ transform: doubled ? "translate(12px,10px)" : "translate(0px,0px)", opacity: doubled ? 0.8 : 0, transition: "transform 1.2s cubic-bezier(.4,1,.5,1), opacity 1s ease" }}>
            <path d={THREAD_D} fill="none" stroke={color} strokeWidth="2.8" strokeLinecap="round" />
          </g>
        </g>
      );
    }

    function Piece({ x, y, rot, form, color, scale = 1 }) {
      return (
        <g style={{ transform: `translate(${x}px, ${y}px) rotate(${rot}deg) scale(${scale})`, transition: "transform 1.1s cubic-bezier(.4,1.1,.5,1), opacity 0.7s" }}>
          {form === "x" && (
            <>
              <path d="M-11,-23 Q-4,-5 0,0 Q4,5 11,23" fill="none" stroke={color} strokeWidth="9.5" strokeLinecap="round" />
              <path d="M11,-23 Q4,-5 0,0 Q-4,5 -11,23" fill="none" stroke={color} strokeWidth="9.5" strokeLinecap="round" />
              <circle cx="0" cy="0" r="5.5" fill="#000000" stroke="#ffffff" strokeWidth="1.5" />
              <circle cx="0" cy="0" r="2" fill="#4ade80" />
            </>
          )}
          {form === "rod" && (
            <>
              <path d="M-12,-18 Q0,-5 0,16 Q0,-5 12,-18" fill="none" stroke={color} strokeWidth="9.5" strokeLinecap="round" />
              <circle cx="0" cy="14" r="5.5" fill="#000000" stroke="#ffffff" strokeWidth="1.5" />
              <circle cx="0" cy="14" r="2" fill="#facc15" />
            </>
          )}
        </g>
      );
    }

    function TelophasePiece({ x, y, rot, color, unwound, scale = 1 }) {
      return (
        <g style={{ transform: `translate(${x}px, ${y}px) rotate(${rot}deg) scale(${scale})`, transition: "transform 1.1s cubic-bezier(.4,1.1,.5,1)" }}>
          <g style={{ opacity: unwound ? 0 : 0.95, transition: "opacity 1.3s ease" }}>
            <path d="M-12,-18 Q0,-5 0,16 Q0,-5 12,-18" fill="none" stroke={color} strokeWidth="9.5" strokeLinecap="round" />
            <circle cx="0" cy="14" r="5.5" fill="#000000" stroke="#ffffff" strokeWidth="1.5" />
          </g>
          <g style={{ opacity: unwound ? 0.75 : 0, transition: "opacity 1.3s ease", transform: "scale(1.2)" }}>
            <path d={THREAD_D} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" />
          </g>
        </g>
      );
    }

    function Centrosome({ x, y }) {
      const rays = [0, 45, 90, 135, 180, 225, 270, 315];
      return (
        <g style={{ transform: `translate(${x}px, ${y}px)`, transition: "transform 1.1s cubic-bezier(.4,1.1,.5,1)" }}>
          {rays.map((a) => (
            <line key={a} x1="0" y1="0" x2={Math.cos((a * Math.PI) / 180) * 15} y2={Math.sin((a * Math.PI) / 180) * 15} stroke="#38bdf8" strokeWidth="1.5" opacity="0.6" />
          ))}
          <circle r="4.5" fill="#38bdf8" stroke="#fff" strokeWidth="1" />
        </g>
      );
    }

    function Spindle({ stageKey }) {
      const poles = CENTROSOME_POS[stageKey];
      if (!poles) return null;
      let targets = [];
      if (stageKey === "anaphase") {
        const sp = SPLIT_POS.anaphase;
        targets = Object.keys(sp).map((k) => {
          const item = sp[k];
          return { x: item.x, y: item.dir === "N" ? item.y + 14 : item.y - 14 };
        });
      } else if (POS[stageKey]) {
        targets = CHROMOSOMES.map((c) => POS[stageKey][c.id]);
      }
      return (
        <g opacity="0.45">
          {targets.map((t, i) => (
            <g key={i}>
              <line x1={poles.top.x} y1={poles.top.y} x2={t.x} y2={t.y} stroke="#7dd3fc" strokeWidth="1.2" style={{ transition: "all 1.1s ease" }} />
              <line x1={poles.bottom.x} y1={poles.bottom.y} x2={t.x} y2={t.y} stroke="#7dd3fc" strokeWidth="1.2" style={{ transition: "all 1.1s ease" }} />
            </g>
          ))}
        </g>
      );
    }

    function EnvelopeFragments({ state }) {
      const nearR = 94;
      const farR = 160;
      const isGone = state === "gone";
      const opacity = isGone ? 0 : state === "fragmenting" ? 0.4 : 0.6;
      return (
        <g>
          {FRAG_ANGLES.map((ang, i) => {
            const r = isGone ? farR + SCATTER_EXTRA[i] : nearR;
            const theta = (ang * Math.PI) / 180;
            return (
              <path key={i} d="M-14,0 Q0,-6 14,0" stroke="#a78bfa" strokeWidth="2.5" fill="none" strokeLinecap="round"
                style={{
                  transform: `translate(${150 + r * Math.sin(theta)}px, ${150 - r * Math.cos(theta)}px) rotate(${ang + (state === "fragmenting" ? (i % 2 === 0 ? 12 : -12) : 0)}deg)`,
                  transition: "transform 1.3s cubic-bezier(.4,1,.5,1), opacity 1.3s",
                  opacity
                }}
              />
            );
          })}
        </g>
      );
    }

    function CytokinesisPinch({ active }) {
      const [started, setStarted] = useState(false);
      useEffect(() => {
        if (!active) { setStarted(false); return; }
        const t = setTimeout(() => setStarted(true), 100);
        return () => clearTimeout(t);
      }, [active]);
      if (!active) return null;
      const dy = started ? 65 : 10;
      return (
        <>
          <g style={{ transform: `translate(0px, ${-dy}px)`, transition: "transform 1.6s cubic-bezier(.4,1,.5,1)" }}>
            <circle cx="150" cy="150" r="95" fill="rgba(56,189,248,0.04)" stroke="rgba(125,211,252,0.45)" strokeWidth="2.5" />
          </g>
          <g style={{ transform: `translate(0px, ${dy}px)`, transition: "transform 1.6s cubic-bezier(.4,1,.5,1)" }}>
            <circle cx="150" cy="150" r="95" fill="rgba(56,189,248,0.04)" stroke="rgba(125,211,252,0.45)" strokeWidth="2.5" />
          </g>
        </>
      );
    }

    function CellView({ stage, replayToken, resting }) {
      const [replicated, setReplicated] = useState(false);
      const [unwound, setUnwound] = useState(false);

      useEffect(() => {
        setReplicated(false);
        if (!resting && stage.key === "interphase") {
          const t = setTimeout(() => setReplicated(true), 1000);
          return () => clearTimeout(t);
        }
      }, [stage.key, replayToken, resting]);

      useEffect(() => {
        setUnwound(false);
        if (stage.key === "telophase") {
          const t = setTimeout(() => setUnwound(true), 1900);
          return () => clearTimeout(t);
        }
      }, [stage.key, replayToken]);

      const isSplit = stage.key === "anaphase" || stage.key === "telophase";
      const positions = isSplit ? SPLIT_POS[stage.key] : POS[stage.key];
      const poles = CENTROSOME_POS[stage.key];
      const envState = stage.key === "interphase" ? "intact" : stage.key === "prophase" ? "fragmenting" : stage.key === "telophase" ? null : "gone";

      return (
        <svg viewBox="0 0 300 300" class="w-full h-full max-w-[340px] block mx-auto">
          {stage.key !== "telophase" && (
            <ellipse cx="150" cy="150" rx={stage.key === "anaphase" ? 115 : 135} ry={stage.key === "anaphase" ? 145 : 135} fill="rgba(56,189,248,0.03)" stroke="rgba(125,211,252,0.4)" strokeWidth="2.5" style={{ transition: "rx 1.2s ease, ry 1.2s ease" }} />
          )}
          <CytokinesisPinch active={stage.key === "telophase"} />
          {stage.key === "interphase" && <circle cx="172" cy="132" r="12" fill="#1e3a5f" opacity="0.7" />}
          {envState && <EnvelopeFragments state={envState} />}
          {stage.key === "telophase" && (
            <>
              <circle cx="150" cy="65" r="52" fill="none" stroke="#a78bfa" strokeWidth="2" strokeDasharray="6 4" opacity="0.7" />
              <circle cx="150" cy="235" r="52" fill="none" stroke="#a78bfa" strokeWidth="2" strokeDasharray="6 4" opacity="0.7" />
            </>
          )}

          {poles && (
            <>
              <Centrosome x={poles.top.x} y={poles.top.y} />
              <Centrosome x={poles.bottom.x} y={poles.bottom.y} />
            </>
          )}

          <Spindle stageKey={stage.key} />

          {stage.key === "interphase" && CHROMOSOMES.map((c) => <ChromatinTerritory key={c.id} x={POS.interphase[c.id].x} y={POS.interphase[c.id].y} rot={POS.interphase[c.id].rot} color={c.color} doubled={replicated} />)}
          {stage.key !== "interphase" && !isSplit && CHROMOSOMES.map((c) => <Piece key={c.id} x={positions[c.id].x} y={positions[c.id].y} rot={positions[c.id].rot} form={positions[c.id].form} color={c.color} scale={positions[c.id].scale} />)}
          {stage.key === "anaphase" && Object.keys(positions).map((pid) => <Piece key={pid} x={positions[pid].x} y={positions[pid].y} rot={positions[pid].rot} form={positions[pid].form} color={positions[pid].color} scale={positions[pid].scale} />)}
          {stage.key === "telophase" && Object.keys(positions).map((pid) => <TelophasePiece key={pid} x={positions[pid].x} y={positions[pid].y} rot={positions[pid].rot} color={positions[pid].color} unwound={unwound} scale={positions[pid].scale} />)}

          {stage.key === "interphase" && (
            <text x="150" y="262" textAnchor="middle" fontSize="10" fontWeight="700" fill={replicated ? "#4ade80" : "#fbbf24"} style={{ transition: "fill 0.5s" }}>
              {resting ? "🔬 평상시 상태의 세포 (염색사 구조)" : replicated ? "✅ 유전 물질(DNA) 복제 완료" : "⏳ 간기: 유전 물질 복제 중..."}
            </text>
          )}
          {stage.key === "telophase" && (
            <text x="150" y="294" textAnchor="middle" fontSize="9.5" fontWeight="700" fill={unwound ? "#4ade80" : "#94a3b8"} style={{ transition: "fill 0.5s" }}>
              {unwound ? "✅ 염색체가 다시 풀어져 간기 상태핵으로 전환" : "세포질 분열 완료 단계..."}
            </text>
          )}
        </svg>
      );
    }

    /* ── 메인 App 메커니즘 ── */
    function App() {
      const [idx, setIdx] = useState(0);
      const [playing, setPlaying] = useState(false);
      const [replayToken, setReplayToken] = useState(0);
      const [started, setStarted] = useState(false);
      const timerRef = useRef(null);

      const stage = STAGES[idx];

      const changeIdx = (newIdx) => {
        setIdx(newIdx);
        setReplayToken((t) => t + 1);
      };

      useEffect(() => {
        if (!playing) {
          if (timerRef.current) clearTimeout(timerRef.current);
          return;
        }
        if (idx >= STAGES.length - 1) {
          setPlaying(false);
          return;
        }
        const dur = stage.key === "interphase" ? 3200 : stage.key === "telophase" ? 3400 : 2800;
        timerRef.current = setTimeout(() => {
          setIdx((i) => i + 1);
          setReplayToken((t) => t + 1);
        }, dur);

        return () => { if (timerRef.current) clearTimeout(timerRef.current); };
      }, [playing, idx, stage.key]);

      return (
        <div class="min-h-screen p-[20px_14px_48px] box-border max-w-md mx-auto">
          <header class="text-center mb-5">
            <div class="text-[9px] tracking-[5px] text-[#38bdf8] font-bold mb-2">생식과 유전 · SIMULATION #2</div>
            <h1 class="m-0 text-2xl font-black bg-gradient-to-r from-[#e4f1ff] to-[#7dd3fc] bg-clip-text text-transparent">체세포 분열 단계별 관찰</h1>
            <p class="mt-2 text-[#4b729f] text-[12.5px]">🦠 동원체 기반 카운팅 규칙을 기준으로 구조화한 정밀 단계 관찰 뷰어</p>
          </header>

          {!started ? (
            <>
              <div class="bg-white/5 border border-blue-900/40 rounded-2xl p-[20px_14px] mb-4">
                <CellView stage={STAGES[0]} replayToken={0} resting />
              </div>
              <div class="text-center mb-4">
                <button onClick={() => { setStarted(true); setIdx(0); }} class="bg-gradient-to-r from-sky-500 to-indigo-500 text-white font-bold text-base p-[14px_32px] rounded-lg shadow-lg shadow-sky-500/30 transition-all hover:scale-105 active:scale-95">
                  🚀 세포 분열 관찰 시작하기
                </button>
              </div>
              <div class="bg-sky-500/5 border border-sky-500/20 rounded-xl p-4 text-[13px] leading-relaxed text-sky-200">
                💡 체세포는 평상시에 핵막 내부에 염색사가 풀어진 유전물질 형태로 존재합니다. 분열 신호를 인지하면 복제를 거치는 <strong>간기</strong>를 기점으로 본격적인 5단계 변화가 연속적으로 일어납니다. 시작 버튼을 클릭해 동원체와 염색분체의 거동을 상세히 관찰해 보세요.
              </div>
            </>
          ) : (
            <>
              <div class="flex justify-center gap-1.5 mb-4 flex-wrap">
                {STAGES.map((s, i) => (
                  <button key={s.key} onClick={() => { setPlaying(false); changeIdx(i); }} class={`p-[8px_14px] rounded-full text-[12.5px] font-bold transition-all ${i === idx ? 'bg-gradient-to-r from-sky-500 to-indigo-500 text-white' : i < idx ? 'bg-sky-500/15 text-sky-300' : 'bg-white/5 text-slate-500'}`}>
                    {s.label}
                  </button>
                ))}
              </div>

              <div class="flex gap-2 justify-center mb-[18px] flex-wrap">
                <button onClick={() => { setPlaying(false); changeIdx(Math.max(0, idx - 1)); }} disabled={idx === 0} class="bg-blue-500/20 text-white p-[10px_18px] rounded-lg font-bold text-sm disabled:opacity-30 disabled:cursor-not-allowed">◀ 이전</button>
                <button onClick={() => { if (idx >= STAGES.length - 1) changeIdx(0); setPlaying(!playing); }} class="bg-gradient-to-r from-sky-500 to-indigo-500 text-white p-[10px_18px] rounded-lg font-bold text-sm min-w-[120px]">{playing ? "⏸ 일시정지" : idx >= STAGES.length - 1 ? "🔁 처음부터 재생" : "▶ 자동 재생"}</button>
                <button onClick={() => { setPlaying(false); changeIdx(Math.min(STAGES.length - 1, idx + 1)); }} disabled={idx === STAGES.length - 1} class="bg-blue-500/20 text-white p-[10px_18px] rounded-lg font-bold text-sm disabled:opacity-30 disabled:cursor-not-allowed">다음 ▶</button>
                <button onClick={() => { setPlaying(false); setStarted(false); }} class="bg-transparent border border-blue-900 text-[#4f7aa6] p-[10px_18px] rounded-lg font-bold text-sm">↩ 초기화</button>
              </div>

              <div class="bg-white/5 border border-blue-900/40 rounded-2xl p-[20px_14px] mb-3">
                <CellView stage={stage} replayToken={replayToken} />
                <div class="flex justify-center gap-x-3.5 gap-y-2 mt-2.5 text-[11px] text-[#587fa9] flex-wrap">
                  <span><span class="inline-block w-2 h-2 bg-[#ef4444] rounded-full mr-1 align-middle"></span>상동염색체 쌍 A</span>
                  <span><span class="inline-block w-2 h-2 bg-[#3b82f6] rounded-full mr-1 align-middle"></span>상동염색체 쌍 B</span>
                  <span><span class="inline-block w-2 h-2 bg-black border border-white rounded-full mr-1 align-middle"></span>동원체</span>
                  <span><span class="inline-block w-2 h-2 bg-sky-400 rounded-full mr-1 align-middle"></span>중심체</span>
                </div>
              </div>

              <div class="grid grid-cols-2 gap-2 mb-1.5">
                <div class="bg-sky-500/5 border border-sky-500/20 rounded-xl p-3 text-center">
                  <div class="text-[11px] text-sky-300 mb-1 font-bold">염색체 수 (동원체 기준)</div>
                  <div class="text-[19px] font-black text-sky-400 font-mono">{stage.chromCount}</div>
                </div>
                <div class="bg-purple-500/5 border border-purple-500/20 rounded-xl p-3 text-center">
                  <div class="text-[11px] text-purple-300 mb-1 font-bold">염색분체 수 (가닥 기준)</div>
                  <div class="text-[19px] font-black text-purple-400 font-mono">{stage.chromatidCount}</div>
                </div>
              </div>

              <div class="text-center text-[11px] text-[#4f739a] font-bold mb-4 tracking-tight">📌 카운팅 기준: {stage.countNotice}</div>

              <div class="bg-white/5 border border-blue-900/20 rounded-xl p-4 mb-3.5">
                <div class="text-[10px] tracking-wider text-sky-400 font-bold mb-1">{stage.en.toUpperCase()}</div>
                <div class="text-sm font-black text-slate-100 mb-2">{stage.title}</div>
                <div class="text-[12.5px] text-slate-300 class-relaxed">{stage.desc}</div>
              </div>

              {idx === STAGES.length - 1 && (
                <div class="bg-gradient-to-br from-sky-500/10 to-purple-500/10 border border-sky-500/20 rounded-xl p-4 mb-3.5 text-center">
                  <div class="text-sm font-black text-sky-300 mb-2">🎉 체세포 분열 사이클 완료</div>
                  <div class="text-[12.5px] text-sky-100 leading-relaxed">하나의 모세포에서 분리되어 생성된 <strong>2개의 딸세포</strong>는 각각 모세포와 완벽히 동일한 종류 및 개수의 염색체 <strong>4개(2n)</strong>를 물려받아, 유전학적으로 <strong>100% 동일한 복제본</strong> 구조를 가집니다.</div>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
