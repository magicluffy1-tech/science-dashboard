      if (search && !s.title.includes(search) && !s.unit.includes(search) && !s.subject.includes(search)) return false;
      return true;
    });

                        e.currentTarget.style.borderColor = m.color;

                        e.currentTarget.style.boxShadow = "none";

                        background: `linear-gradient(135deg, ${m.bg}CC, #090F1C)`, 
                        border: `1px solid ${m.color}33`, 
                        borderRadius: "20px", padding: "36px", cursor: "pointer", textAlign: "left", transition: "all 0.25s ease-out",
                        display: "flex", flexDirection: "column", justifyContent: "space-between", minHeight: "280px"

                      <div style={{ display: "flex", alignItems: "center", gap: "20px" }}>
                        <div style={{ 
                          width: "64px", height: "64px", borderRadius: "16px", background: `${m.color}15`, border: `1px solid ${m.color}33`,
                          display: "flex", alignItems: "center", justifyCenter: "center", justifyContent: "center", fontSize: "32px" 
                        }}>{m.emoji}</div>
                        <div>
                          <div style={{ fontWeight: 800, fontSize: "24px", color: "#FFFFFF", marginBottom: "4px" }}>{subj}</div>
                          <div style={{ fontSize: "14px", color: m.light, fontWeight: 600 }}>총 {cnt}개 가상실험</div>
                        </div>
                      </div>

                      <div style={{ marginTop: "24px" }}>
                        <div style={{ fontSize: "11px", color: "#475569", fontWeight: 700, letterSpacing: "0.05em", marginBottom: "10px", textTransform: "uppercase" }}>주요 탐색 단원</div>

                  return (

                        e.currentTarget.style.boxShadow = "0 20px 40px rgba(56, 189, 248, 0.15)";

          {/* ── 리스트 선택 시 매칭 시뮬레이션 카드 그리드 리스트 ── */}

                  })
                ) : (
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))", gap:16 }}>
                    {filtered.map(sim => <SimCard key={sim.id} sim={sim}/>)}
                  </div>
                )
              )}
            </>
          )}
        </main>
      </div>

      {/* ── 안내 모달 팝업 ── */}
      {openSim && (() => {
        const m = SUBJECT_META[openSim.subject];
        return (
          <div onClick={() => setOpenSim(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(6px)" }}>
            <div onClick={e=>e.stopPropagation()} style={{ background:"#0A0F1E", border:`1px solid ${m.color}`, borderRadius:20, padding:"40px 36px", maxWidth:520, width:"90%", boxShadow:`0 0 80px ${m.color}33` }}>
              <div style={{ fontSize:64, textAlign:"center", marginBottom:16 }}>{openSim.icon}</div>
              <div style={{ fontWeight:800, fontSize:24, color:"#FFFFFF", textAlign:"center", marginBottom:10 }}>{openSim.title}</div>
              <div style={{ display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap", marginBottom:20 }}>
                <span style={{ background:`${m.color}22`, color:m.light, borderRadius:6, padding:"4px 12px", fontSize:12, fontWeight:700 }}>{m.emoji} {openSim.subject}</span>
                <span style={{ background:"#1E293B", color:"#CBD5E1", borderRadius:6, padding:"4px 12px", fontSize:12 }}>🎓 {openSim.grade}학년</span>
                <span style={{ background:"#1E293B", color:"#CBD5E1", borderRadius:6, padding:"4px 12px", fontSize:12 }}>📂 {openSim.unit}</span>
              </div>
              <div style={{ fontSize:15, color:"#CBD5E1", textAlign:"center", marginBottom:26, lineHeight:1.7 }}>{openSim.desc}</div>
              <div style={{ background:"#0F172A", border:"1px dashed #475569", borderRadius:12, padding:"18px", textAlign:"center", marginBottom:24 }}>
                <div style={{ fontSize:13, color:"#94A3B8", marginBottom:8, fontWeight:600 }}>시뮬레이션 파일 연결 방법</div>
                <div style={{ fontSize:12.5, color:"#94A3B8", lineHeight:1.8 }}>
                  <code style={{ background:"#1E293B", padding:"2px 8px", borderRadius:4, color:"#F1F5F9" }}>SIMULATIONS</code> 배열에서<br/>
                  id <strong style={{ color:m.light }}>{openSim.id}</strong>번 항목의 <code style={{ background:"#1E293B", padding:"2px 8px", borderRadius:4, color:"#F1F5F9" }}>url</code> 필드에 경로를 입력하세요
                </div>
              </div>
              <button onClick={() => setOpenSim(null)} style={{ width:"100%", padding:"13px", background:"#1E293B", border:"1px solid #475569", borderRadius:10, color:"FFFFFF", cursor:"pointer", fontSize:15, fontWeight:700, transition:"background 0.2s" }} onMouseEnter={e=>e.currentTarget.style.background="#334155"} onMouseLeave={e=>e.currentTarget.style.background="#1E293B"}>닫기</button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ScienceDashboard />);
  </script>
</body>
</html>
