  };

  return (
    <div style={{ fontFamily:"'Pretendard','Noto Sans KR',system-ui,sans-serif", background:"#060B14", minHeight:"100vh", color:"#E2E8F0" }}>

      {/* ── Header ── */}
      <header style={{ borderBottom:"1px solid #1E293B", padding:"14px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:50, backdropFilter:"blur(12px)", background:"rgba(6,11,20,0.92)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ width:38, height:38, borderRadius:10, background:"linear-gradient(135deg,#3B82F6,#8B5CF6)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>🔬</div>
          <div>
            <div style={{ fontWeight:800, fontSize:17, letterSpacing:"-0.4px" }}>과학 시뮬레이션 허브</div>
            <div style={{ fontSize:10.5, color:"#475569" }}>중학교 1–3학년 · {SIMULATIONS.length}개 시뮬레이션</div>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ position:"relative" }}>
            <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", fontSize:13, color:"#475569" }}>🔍</span>
            <input
              placeholder="제목·단원·과목 검색..."
              value={search}
              onChange={e => setSearch(e.target.value)}
              style={{ background:"#0F172A", border:"1px solid #1E293B", borderRadius:8, padding:"8px 14px 8px 32px", color:"#E2E8F0", fontSize:13, width:230, outline:"none" }}
            />
          </div>
        </div>
      </header>

      <div style={{ display:"flex", minHeight:"calc(100vh - 67px)" }}>

        {/* ── Sidebar ── */}
        <aside style={{ width:230, borderRight:"1px solid #1E293B", padding:"18px 0", flexShrink:0, background:"#070C16", overflowY:"auto" }}>

          {/* 보기 모드 토글 */}
          <div style={{ padding:"0 14px 16px", borderBottom:"1px solid #1E293B" }}>
            <div style={{ fontSize:9.5, color:"#475569", fontWeight:700, letterSpacing:"0.1em", marginBottom:8, textTransform:"uppercase" }}>탐색 방식</div>
            <div style={{ display:"flex", background:"#0F172A", borderRadius:8, padding:3, gap:2 }}>
              {[["subject","📚 과목별"],["grade","🎓 학년별"]].map(([mode,label]) => (
                <button key={mode} onClick={() => { setViewMode(mode); setSelectedSubject(null); setSelectedGrade(null); setSelectedUnit(null); }}
                  style={{ flex:1, padding:"8px 4px", borderRadius:6, border:"none", cursor:"pointer", fontSize:12, fontWeight:700, transition:"all 0.2s",
                    background: viewMode===mode ? "linear-gradient(135deg,#3B82F6,#8B5CF6)" : "transparent",
                    color: viewMode===mode ? "#fff" : "#64748B" }}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          {/* 과목별 */}
          {viewMode === "subject" && (
            <div style={{ paddingTop:14 }}>
              <div style={{ padding:"0 14px", fontSize:9.5, color:"#475569", fontWeight:700, letterSpacing:"0.1em", marginBottom:8, textTransform:"uppercase" }}>과목</div>
              {[null, ...SUBJECTS].map(subj => {
                const m = subj ? SUBJECT_META[subj] : null;
                const active = selectedSubject === subj;
                const cnt = subj ? SIMULATIONS.filter(s=>s.subject===subj).length : SIMULATIONS.length;
                return (
                  <button key={subj??'all'} onClick={() => setSelectedSubject(subj)}
                    style={{ width:"100%", textAlign:"left", padding:"9px 18px", border:"none",
                      background: active ? (m?`${m.bg}BB`:"#1E293B") : "transparent",
                      color: active ? (m?m.light:"#E2E8F0") : "#64748B",
                      cursor:"pointer", fontSize:13, fontWeight: active?700:400,
                      borderLeft: active ? `3px solid ${m?m.color:"#3B82F6"}` : "3px solid transparent",
                      transition:"all 0.15s", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span>{subj ? `${m.emoji} ${subj}` : "📚 전체"}</span>
                    <span style={{ fontSize:10, background:"#1E293B", borderRadius:4, padding:"1px 6px", color:"#94A3B8" }}>{cnt}</span>
                  </button>
                );
              })}
              {/* 과목별 단원 표시 */}
              {selectedSubject && (
                <div style={{ marginTop:14, borderTop:"1px solid #1E293B", paddingTop:12 }}>
                  <div style={{ padding:"0 14px", fontSize:9.5, color:"#475569", fontWeight:700, letterSpacing:"0.1em", marginBottom:8, textTransform:"uppercase" }}>포함 단원</div>
                  {[...new Set(SIMULATIONS.filter(s=>s.subject===selectedSubject).map(s=>s.unit))].map(u=>(
                    <div key={u} style={{ padding:"5px 18px", fontSize:11.5, color:"#475569", borderLeft:`3px solid ${meta.color}22` }}>· {u}</div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* 학년별 */}
          {viewMode === "grade" && (
            <div style={{ paddingTop:14 }}>
              <div style={{ padding:"0 14px", fontSize:9.5, color:"#475569", fontWeight:700, letterSpacing:"0.1em", marginBottom:8, textTransform:"uppercase" }}>학년</div>
              {[null,...GRADES].map(g => {
                const active = selectedGrade === g;
                return (
                  <button key={g??'all'} onClick={() => { setSelectedGrade(g); setSelectedUnit(null); }}
                    style={{ width:"100%", textAlign:"left", padding:"9px 18px", border:"none",
                      background: active ? "#0C1929" : "transparent",
                      color: active ? "#38BDF8" : "#64748B",
                      cursor:"pointer", fontSize:13, fontWeight:active?700:400,
                      borderLeft: active?"3px solid #38BDF8":"3px solid transparent",
                      transition:"all 0.15s", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span>{g ? `🎓 ${g}학년` : "📚 전체 학년"}</span>
                    <span style={{ fontSize:10, background:"#1E293B", borderRadius:4, padding:"1px 6px", color:"#94A3B8" }}>
                      {g ? SIMULATIONS.filter(s=>s.grade===g).length : SIMULATIONS.length}
                    </span>
                  </button>
                );
              })}

              {selectedGrade && (
                <div style={{ marginTop:14, borderTop:"1px solid #1E293B", paddingTop:12 }}>
                  <div style={{ padding:"0 14px", fontSize:9.5, color:"#475569", fontWeight:700, letterSpacing:"0.1em", marginBottom:8, textTransform:"uppercase" }}>단원</div>
                  {[null,...GRADE_UNITS[selectedGrade]].map(u => {
                    const unitSubj = u ? UNIT_SUBJECT[u] : null;
                    const unitMeta = unitSubj ? SUBJECT_META[unitSubj] : null;
                    const cnt = u ? SIMULATIONS.filter(s=>s.grade===selectedGrade&&s.unit===u).length : SIMULATIONS.filter(s=>s.grade===selectedGrade).length;
                    const active = selectedUnit === u;
                    return (
                      <button key={u??'all'} onClick={() => setSelectedUnit(u)}
                        style={{ width:"100%", textAlign:"left", padding:"7px 18px", border:"none",
                          background: active ? "#0F172A" : "transparent",
                          color: active ? (unitMeta?unitMeta.light:"#CBD5E1") : "#64748B",
                          cursor:"pointer", fontSize:12, fontWeight:active?700:400,
                          borderLeft: active ? `3px solid ${unitMeta?unitMeta.color:"#3B82F6"}` : "3px solid transparent",
                          transition:"all 0.15s", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <span>{u ? `· ${u}` : "전체 단원"}</span>
                        <span style={{ fontSize:10, background:"#1E293B", borderRadius:4, padding:"1px 5px", color:"#94A3B8" }}>{cnt}</span>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </aside>

        {/* ── Main ── */}
        <main style={{ flex:1, padding:"22px 26px", overflow:"auto" }}>

          {/* ── 과목별 홈 ── */}
          {viewMode==="subject" && !selectedSubject && !search && (
            <>
              <div style={{ marginBottom:22 }}>
                <div style={{ fontWeight:800, fontSize:22, marginBottom:4 }}>과목별 탐색</div>
                <div style={{ fontSize:12.5, color:"#64748B" }}>과목 카드를 클릭하면 해당 과목의 모든 시뮬레이션이 나타납니다.</div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:14, marginBottom:28 }}>
                {SUBJECTS.map(subj => {
                  const m = SUBJECT_META[subj];
                  const cnt = SIMULATIONS.filter(s=>s.subject===subj).length;
                  const unitList = [...new Set(SIMULATIONS.filter(s=>s.subject===subj).map(s=>s.unit))];
                  return (
                    <button key={subj} onClick={() => setSelectedSubject(subj)}
                      onMouseEnter={e => { e.currentTarget.style.transform="translateY(-3px)"; e.currentTarget.style.boxShadow=`0 10px 30px ${m.color}30`; }}
                      onMouseLeave={e => { e.currentTarget.style.transform="none"; e.currentTarget.style.boxShadow="none"; }}
                      style={{ background:`linear-gradient(135deg,${m.bg},#060B14)`, border:`1px solid ${m.color}44`, borderRadius:14, padding:"22px 20px", cursor:"pointer", textAlign:"left", transition:"all 0.18s" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>
                        <div style={{ width:46, height:46, borderRadius:12, background:`${m.color}22`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:24 }}>{m.emoji}</div>
                        <div>
                          <div style={{ fontWeight:800, fontSize:18, color:m.light }}>{subj}</div>
                          <div style={{ fontSize:11, color:"#475569" }}>시뮬레이션 {cnt}개</div>
                        </div>
                      </div>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                        {unitList.map(u => (
                          <span key={u} style={{ background:`${m.color}18`, color:m.color, borderRadius:5, padding:"2px 8px", fontSize:10.5, fontWeight:500 }}>{u}</span>
                        ))}
                      </div>
                    </button>
                  );
                })}
              </div>
            </>
          )}

          {/* ── 학년별 홈 ── */}
          {viewMode==="grade" && !selectedGrade && !search && (
            <>
              <div style={{ marginBottom:22 }}>
                <div style={{ fontWeight:800, fontSize:22, marginBottom:4 }}>학년별 탐색</div>
                <div style={{ fontSize:12.5, color:"#64748B" }}>학년 카드를 선택한 뒤 단원을 골라 시뮬레이션을 찾으세요.</div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:14 }}>
                {GRADES.map(g => {
                  const sims = SIMULATIONS.filter(s=>s.grade===g);
                  const units = GRADE_UNITS[g];
                  return (
                    <button key={g} onClick={() => { setSelectedGrade(g); setSelectedUnit(null); }}
                      onMouseEnter={e => { e.currentTarget.style.transform="translateY(-3px)"; e.currentTarget.style.boxShadow="0 10px 30px #3B82F630"; }}
                      onMouseLeave={e => { e.currentTarget.style.transform="none"; e.currentTarget.style.boxShadow="none"; }}
                      style={{ background:"linear-gradient(135deg,#0C1929,#060B14)", border:"1px solid #1E40AF44", borderRadius:14, padding:"22px 18px", cursor:"pointer", textAlign:"left", transition:"all 0.18s" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:14 }}>
                        <div style={{ width:46, height:46, borderRadius:12, background:"#0F2A4A", display:"flex", alignItems:"center", justifyContent:"center", fontSize:24 }}>🎓</div>
                        <div>
                          <div style={{ fontWeight:800, fontSize:18, color:"#38BDF8" }}>{g}학년</div>
                          <div style={{ fontSize:11, color:"#475569" }}>{sims.length}개 시뮬레이션</div>
                        </div>
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                        {units.map(u => {
                          const subj = UNIT_SUBJECT[u];
                          const um = SUBJECT_META[subj];
                          const ucnt = SIMULATIONS.filter(s=>s.grade===g&&s.unit===u).length;
                          return (
                            <div key={u} style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                              <span style={{ fontSize:11.5, color:"#64748B" }}>{um.emoji} {u}</span>
                              <span style={{ fontSize:10, color:um.light, fontWeight:600 }}>{ucnt}</span>
                            </div>
                          );
                        })}
                      </div>
                    </button>
                  );
                })}
              </div>
            </>
          )}

          {/* ── 선택된 상태의 컨텍스트 바 ── */}
          {showCards && (
            <div style={{ marginBottom:18 }}>
              {viewMode==="subject" && meta && (
                <div style={{ display:"flex", alignItems:"center", gap:16, padding:"14px 18px", borderRadius:12, background:`${meta.bg}`, border:`1px solid ${meta.color}44`, marginBottom:18 }}>
                  <div style={{ fontSize:32 }}>{meta.emoji}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:800, fontSize:19, color:meta.light }}>{selectedSubject}</div>
                    <div style={{ fontSize:11.5, color:"#64748B", marginTop:2 }}>시뮬레이션 {filtered.length}개</div>
                  </div>
                  <button onClick={() => setSelectedSubject(null)} style={{ background:"transparent", border:"1px solid #334155", borderRadius:7, padding:"6px 12px", color:"#64748B", cursor:"pointer", fontSize:12 }}>← 전체</button>
                </div>
              )}
              {viewMode==="grade" && selectedGrade && (
                <div style={{ display:"flex", alignItems:"center", gap:16, padding:"14px 18px", borderRadius:12, background:"#0C1929", border:"1px solid #38BDF822", marginBottom:18 }}>
                  <div style={{ fontSize:32 }}>🎓</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:800, fontSize:19, color:"#38BDF8" }}>
                      {selectedGrade}학년 {selectedUnit && `· ${selectedUnit}`}
                    </div>
                    <div style={{ fontSize:11.5, color:"#64748B", marginTop:2 }}>시뮬레이션 {filtered.length}개</div>
                  </div>
                  <button onClick={() => { setSelectedGrade(null); setSelectedUnit(null); }} style={{ background:"transparent", border:"1px solid #334155", borderRadius:7, padding:"6px 12px", color:"#64748B", cursor:"pointer", fontSize:12 }}>← 전체</button>
                </div>
              )}
              {search && (
                <div style={{ padding:"12px 18px", borderRadius:12, background:"#0F172A", border:"1px solid #1E293B", marginBottom:18, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontSize:13, color:"#94A3B8" }}>🔍 <strong style={{ color:"#E2E8F0" }}>"{search}"</strong> 검색 결과 {filtered.length}개</span>
                  <button onClick={() => setSearch("")} style={{ background:"transparent", border:"none", color:"#475569", cursor:"pointer", fontSize:18, lineHeight:1 }}>×</button>
                </div>
              )}
            </div>
          )}

          {/* ── 시뮬레이션 카드 그리드 ── */}
          {showCards && (
            <>
              {filtered.length === 0 ? (
                <div style={{ textAlign:"center", padding:"80px 0", color:"#475569" }}>
                  <div style={{ fontSize:48, marginBottom:14 }}>🔭</div>
                  <div style={{ fontSize:16, fontWeight:600 }}>해당하는 시뮬레이션이 없습니다</div>
                  <div style={{ fontSize:13, marginTop:6 }}>다른 과목·학년·단원을 선택해 보세요</div>
                </div>
              ) : (
                /* 학년별 모드에서 과목 그루핑 표시 */
                viewMode==="grade" && selectedGrade && !selectedUnit ? (
                  GRADE_UNITS[selectedGrade].map(unit => {
                    const unitSims = filtered.filter(s=>s.unit===unit);
                    if (!unitSims.length) return null;
                    const subj = UNIT_SUBJECT[unit];
                    const um = SUBJECT_META[subj];
                    return (
                      <div key={unit} style={{ marginBottom:28 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12, cursor:"pointer" }} onClick={() => setSelectedUnit(unit)}>
                          <div style={{ width:3, height:20, background:um.color, borderRadius:2 }}/>
                          <span style={{ fontWeight:700, fontSize:15, color:um.light }}>{um.emoji} {unit}</span>
                          <span style={{ fontSize:11, color:"#475569", background:"#1E293B", borderRadius:5, padding:"1px 7px" }}>{unitSims.length}개</span>
                          <span style={{ fontSize:10, color:um.color, marginLeft:"auto" }}>단원만 보기 →</span>
                        </div>
                        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))", gap:12 }}>
                          {unitSims.map(sim => <SimCard key={sim.id} sim={sim}/>)}
                        </div>
                      </div>
                    );
                  })
                ) : (
                  /* 그 외: 플랫 그리드 */
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))", gap:12 }}>
                    {filtered.map(sim => <SimCard key={sim.id} sim={sim}/>)}
                  </div>
                )
              )}
            </>
          )}
        </main>
      </div>

      {/* ── 시뮬레이션 모달 ── */}
      {openSim && (() => {
        const m = SUBJECT_META[openSim.subject];
        return (
          <div onClick={() => setOpenSim(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(5px)" }}>
            <div onClick={e=>e.stopPropagation()} style={{ background:"#0A0F1E", border:`1px solid ${m.color}55`, borderRadius:18, padding:"32px 30px", maxWidth:460, width:"90%", boxShadow:`0 0 60px ${m.color}25` }}>
              <div style={{ fontSize:52, textAlign:"center", marginBottom:14 }}>{openSim.icon}</div>
              <div style={{ fontWeight:800, fontSize:20, color:"#F1F5F9", textAlign:"center", marginBottom:8 }}>{openSim.title}</div>
              <div style={{ display:"flex", gap:7, justifyContent:"center", flexWrap:"wrap", marginBottom:16 }}>
                <span style={{ background:`${m.color}22`, color:m.light, borderRadius:6, padding:"3px 11px", fontSize:11.5, fontWeight:700 }}>{m.emoji} {openSim.subject}</span>
                <span style={{ background:"#1E293B", color:"#94A3B8", borderRadius:6, padding:"3px 11px", fontSize:11.5 }}>🎓 {openSim.grade}학년</span>
                <span style={{ background:"#1E293B", color:"#94A3B8", borderRadius:6, padding:"3px 11px", fontSize:11.5 }}>📂 {openSim.unit}</span>
              </div>
              <div style={{ fontSize:13.5, color:"#94A3B8", textAlign:"center", marginBottom:22, lineHeight:1.7 }}>{openSim.desc}</div>
              <div style={{ background:"#0F172A", border:"1px dashed #334155", borderRadius:10, padding:"16px", textAlign:"center", marginBottom:18 }}>
                <div style={{ fontSize:12, color:"#475569", marginBottom:8 }}>시뮬레이션 파일 연결 방법</div>
                <div style={{ fontSize:11.5, color:"#64748B", lineHeight:1.8 }}>
                  <code style={{ background:"#1E293B", padding:"1px 7px", borderRadius:4, color:"#94A3B8" }}>SIMULATIONS</code> 배열에서<br/>
                  id <strong style={{ color:m.light }}>{openSim.id}</strong>번 항목의 <code style={{ background:"#1E293B", padding:"1px 7px", borderRadius:4, color:"#94A3B8" }}>url</code> 필드에 경로를 입력하세요
                </div>
              </div>
              <button onClick={() => setOpenSim(null)} style={{ width:"100%", padding:"11px", background:"#1E293B", border:"1px solid #334155", borderRadius:9, color:"#94A3B8", cursor:"pointer", fontSize:13.5, fontWeight:600 }}>닫기</button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ScienceDashboard />);
  </script>
</body>
</html>
