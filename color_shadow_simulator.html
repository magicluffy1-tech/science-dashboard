<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>색 그림자 시뮬레이터</title>
<style>
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:#0d0d0f;
    color:#eee;
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 16px 40px;
  }
  h1{margin:0 0 4px;font-size:22px;}
  p.sub{color:#8a8a92;font-size:13px;margin:0 0 16px;text-align:center;max-width:520px;}

  .stage{
    position:relative;
    width:100%;
    max-width:720px;
    aspect-ratio:3/2;
    background:#000;
    border-radius:8px;
    overflow:hidden;
    touch-action:none;
  }
  canvas{width:100%;height:100%;display:block;}

  .handle{
    position:absolute;
    width:34px;height:34px;
    border-radius:50%;
    transform:translate(-50%,-50%);
    cursor:grab;
    border:3px solid rgba(255,255,255,.85);
    box-shadow:0 0 14px 2px currentColor;
    display:flex;align-items:center;justify-content:center;
    user-select:none;
    -webkit-user-drag:none;
    -webkit-touch-callout:none;
  }
  .handle:active{cursor:grabbing;}
  .handle.red{background:#ff2b2b;color:#ff2b2b;}
  .handle.green{background:#22d06a;color:#22d06a;}
  .handle.blue{background:#2b6bff;color:#2b6bff;}
  .handle.obj{
    background:transparent;
    border:none;
    box-shadow:none;
  }
  .hint{
    position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
    font-size:11px;color:#cfcfcf;background:rgba(0,0,0,.4);
    padding:3px 8px;border-radius:10px;pointer-events:none;
  }

  .controls{
    width:100%;
    max-width:720px;
    display:flex;
    flex-wrap:wrap;
    gap:26px;
    justify-content:center;
    padding:18px 12px 0;
  }
  .ctrl{display:flex;align-items:center;gap:10px;}
  .ctrl input[type="checkbox"]{width:18px;height:18px;cursor:pointer;}
  .ctrl label{font-size:15px;cursor:pointer;}
  .ctrl input[type="range"]{width:140px;cursor:pointer;}
  .ctrl.red input[type="range"]{accent-color:#ff2b2b;}
  .ctrl.green input[type="range"]{accent-color:#22d06a;}
  .ctrl.blue input[type="range"]{accent-color:#2b6bff;}
</style>
</head>
<body>

<h1>색 그림자 시뮬레이터</h1>
<p class="sub">동그란 조명(●)과 가운데 물체(원통)를 직접 드래그해서 옮겨보세요. 물체가 각 빛을 가리는 방향으로 나머지 두 빛의 합성색 그림자가 실시간으로 계산됩니다.</p>

<div class="stage" id="stage">
  <canvas id="floor" width="300" height="200"></canvas>
  <div class="handle red"   id="hRed"   draggable="false"></div>
  <div class="handle green" id="hGreen" draggable="false"></div>
  <div class="handle blue"  id="hBlue"  draggable="false"></div>
  <div class="handle obj"   id="hObj"   draggable="false"></div>
  <div class="hint">조명과 물체를 드래그해 보세요</div>
</div>

<div class="controls">
  <div class="ctrl">
    <input type="checkbox" id="chkRays">
    <label for="chkRays">광선 표시 (직진하는 빛)</label>
  </div>
  <div class="ctrl">
    <label for="selShape">물체 모양</label>
    <select id="selShape" style="padding:4px 8px;border-radius:6px;">
      <option value="circle">원기둥</option>
      <option value="square">각기둥(사각)</option>
      <option value="triangle">삼각기둥</option>
      <option value="star">별모양</option>
    </select>
  </div>
  <div class="ctrl">
    <label for="sldSize">물체 크기</label>
    <input type="range" id="sldSize" min="6" max="40" value="18">
  </div>
</div>

<div class="controls">
  <div class="ctrl red">
    <input type="checkbox" id="chkRed" checked>
    <label for="chkRed">Red</label>
    <input type="range" id="sldRed" min="0" max="100" value="100">
  </div>
  <div class="ctrl green">
    <input type="checkbox" id="chkGreen" checked>
    <label for="chkGreen">Green</label>
    <input type="range" id="sldGreen" min="0" max="100" value="100">
  </div>
  <div class="ctrl blue">
    <input type="checkbox" id="chkBlue" checked>
    <label for="chkBlue">Blue</label>
    <input type="range" id="sldBlue" min="0" max="100" value="100">
  </div>
</div>

<script>
(function(){
  const W = 300, H = 200;              // 내부 연산 해상도 (부드러운 경계를 위해 상향)
  const canvas = document.getElementById('floor');
  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(W, H);
  const data = img.data;
  const maxDist = 260;                 // 빛이 도달하는 최대 거리(감쇠 기준)
  const ambient = 10;                  // 아무 빛도 안 닿는 곳의 최소 밝기(완전 암흑 방지)

  const stage = document.getElementById('stage');

  const lights = {
    red:   { x: 38,  y: 100, ch: 0, handle: document.getElementById('hRed')   },
    green: { x: 150, y: 181, ch: 1, handle: document.getElementById('hGreen') },
    blue:  { x: 262, y: 100, ch: 2, handle: document.getElementById('hBlue')  }
  };
  const obstacle = { x: 150, y: 100, r: 18, shape: 'circle', handle: document.getElementById('hObj') };

  const state = {
    red:   { on: true, strength: 1 },
    green: { on: true, strength: 1 },
    blue:  { on: true, strength: 1 }
  };
  let showRays = false;

  // 선분(광원→픽셀)이 물체(원)를 가로지르는지 판정
  // 광원(외부 점)에서 원(물체)에 그은 두 접선의 접점을 구한다
  function tangentPoints(px, py, cx, cy, r){
    const dx = cx - px, dy = cy - py;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d <= r) return null; // 광원이 물체 안/경계에 있으면 접선 없음
    const ux = dx / d, uy = dy / d;
    const vx = -uy, vy = ux;
    const a = (r * r) / d;
    const b = r * Math.sqrt(d * d - r * r) / d;
    return [
      { x: cx - a*ux + b*vx, y: cy - a*uy + b*vy },
      { x: cx - a*ux - b*vx, y: cy - a*uy - b*vy }
    ];
  }

  function silhouetteFromVerts(light, verts){
    const cx = verts.reduce((s,v)=>s+v.x,0) / verts.length;
    const cy = verts.reduce((s,v)=>s+v.y,0) / verts.length;
    const baseAngle = Math.atan2(cy - light.y, cx - light.x);
    let minAngle = Infinity, maxAngle = -Infinity, minV = null, maxV = null;
    verts.forEach(v => {
      let ang = Math.atan2(v.y - light.y, v.x - light.x) - baseAngle;
      while (ang > Math.PI) ang -= 2*Math.PI;
      while (ang < -Math.PI) ang += 2*Math.PI;
      if (ang < minAngle){ minAngle = ang; minV = v; }
      if (ang > maxAngle){ maxAngle = ang; maxV = v; }
    });
    return [minV, maxV];
  }

  function drawRays(ctx, light, colorCss, verts){
    const pts = verts
      ? silhouetteFromVerts(light, verts)
      : tangentPoints(light.x, light.y, obstacle.x, obstacle.y, obstacle.r);
    if (!pts) return;
    ctx.save();
    ctx.setLineDash([6, 5]);
    ctx.lineWidth = 1.4;
    ctx.strokeStyle = colorCss;
    ctx.globalAlpha = 0.85;
    pts.forEach(p => {
      const dx = p.x - light.x, dy = p.y - light.y;
      const len = Math.sqrt(dx*dx + dy*dy) || 1;
      const ex = light.x + (dx/len) * (W + H); // 화면 밖까지 쭉 연장 (캔버스가 알아서 잘라줌)
      const ey = light.y + (dy/len) * (W + H);
      ctx.beginPath();
      ctx.moveTo(light.x, light.y);
      ctx.lineTo(ex, ey);
      ctx.stroke();
    });
    ctx.restore();
  }

  // 모양별 꼭짓점 생성 (원은 별도 수식으로 처리하므로 여기선 다각형만)
  function getShapeVertices(shape, cx, cy, r){
    if (shape === 'square'){
      return [
        { x: cx - r, y: cy - r }, { x: cx + r, y: cy - r },
        { x: cx + r, y: cy + r }, { x: cx - r, y: cy + r }
      ];
    }
    if (shape === 'triangle'){
      const pts = [];
      for (let k = 0; k < 3; k++){
        const ang = -Math.PI/2 + k * (2*Math.PI/3);
        pts.push({ x: cx + r*Math.cos(ang), y: cy + r*Math.sin(ang) });
      }
      return pts;
    }
    if (shape === 'star'){
      const pts = []; const spikes = 5, outerR = r, innerR = r*0.45;
      for (let k = 0; k < spikes*2; k++){
        const ang = -Math.PI/2 + k * (Math.PI/spikes);
        const rad = (k % 2 === 0) ? outerR : innerR;
        pts.push({ x: cx + rad*Math.cos(ang), y: cy + rad*Math.sin(ang) });
      }
      return pts;
    }
    return null; // circle
  }

  function cross3(o, a, b){ return (a.x-o.x)*(b.y-o.y) - (a.y-o.y)*(b.x-o.x); }
  function segmentsIntersect(p1, p2, p3, p4){
    const d1 = cross3(p3,p4,p1), d2 = cross3(p3,p4,p2);
    const d3 = cross3(p1,p2,p3), d4 = cross3(p1,p2,p4);
    return ((d1>0&&d2<0)||(d1<0&&d2>0)) && ((d3>0&&d4<0)||(d3<0&&d4>0));
  }
  function blockedByPolygon(lx, ly, px, py, verts){
    const L = {x:lx,y:ly}, P = {x:px,y:py};
    for (let i = 0; i < verts.length; i++){
      const a = verts[i], b = verts[(i+1) % verts.length];
      if (segmentsIntersect(L, P, a, b)) return true;
    }
    return false;
  }
  function isBlocked(lx, ly, px, py, verts){
    if (!verts) return blockedByObstacle(lx, ly, px, py, obstacle.x, obstacle.y, obstacle.r);
    return blockedByPolygon(lx, ly, px, py, verts);
  }

  function blockedByObstacle(lx, ly, px, py, cx, cy, r){
    const dx = px - lx, dy = py - ly;
    const fx = lx - cx, fy = ly - cy;
    const a = dx*dx + dy*dy;
    if (a === 0) return false;
    const b = 2*(fx*dx + fy*dy);
    const c = (fx*fx + fy*fy) - r*r;
    const disc = b*b - 4*a*c;
    if (disc < 0) return false;
    const sq = Math.sqrt(disc);
    const t1 = (-b - sq) / (2*a);
    const t2 = (-b + sq) / (2*a);
    const lo = Math.max(t1, 0), hi = Math.min(t2, 1);
    return lo <= hi && hi >= 0 && lo <= 1;
  }

  function render(){
    const L = [lights.red, lights.green, lights.blue];
    const S = [state.red, state.green, state.blue];
    const shapeVerts = getShapeVertices(obstacle.shape, obstacle.x, obstacle.y, obstacle.r);
    const offsets = shapeVerts
      ? [[-0.3,-0.3],[0.3,0.3]]          // 다각형: 연산량 절약을 위해 2포인트 샘플링
      : [[-0.3,-0.3],[0.3,-0.3],[-0.3,0.3],[0.3,0.3]]; // 원: 4포인트 샘플링

    for (let y = 0; y < H; y++){
      for (let x = 0; x < W; x++){
        let r = ambient, g = ambient, b = ambient;

        for (let i = 0; i < 3; i++){
          const s = S[i];
          if (!s.on || s.strength <= 0) continue;
          const li = L[i];
          const dx = x - li.x, dy = y - li.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist >= maxDist) continue;

          // 그림자 경계를 부드럽게 하기 위해 픽셀 주변 몇 곳을 미세 샘플링해 평균
          let occluded = 0;
          for (const [ox, oy] of offsets){
            if (isBlocked(li.x, li.y, x+ox, y+oy, shapeVerts)) occluded++;
          }
          const lit = 1 - occluded / offsets.length;
          if (lit <= 0) continue;

          const intensity = (1 - dist / maxDist) * s.strength * lit;
          const val = intensity * 240;
          if (li.ch === 0) r += val;
          else if (li.ch === 1) g += val;
          else b += val;
        }

        const idx = (y * W + x) * 4;
        data[idx]     = r > 255 ? 255 : r;
        data[idx + 1] = g > 255 ? 255 : g;
        data[idx + 2] = b > 255 ? 255 : b;
        data[idx + 3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);

    // 물체 그리기 (모양에 따라 원 또는 다각형)
    ctx.save();
    const grad = ctx.createRadialGradient(
      obstacle.x - obstacle.r*0.35, obstacle.y - obstacle.r*0.35, 1,
      obstacle.x, obstacle.y, obstacle.r * 1.15
    );
    grad.addColorStop(0, '#fdfdfe');
    grad.addColorStop(1, '#b9b9c0');
    ctx.beginPath();
    if (shapeVerts){
      shapeVerts.forEach((v, idx) => idx === 0 ? ctx.moveTo(v.x, v.y) : ctx.lineTo(v.x, v.y));
      ctx.closePath();
    } else {
      ctx.arc(obstacle.x, obstacle.y, obstacle.r, 0, Math.PI*2);
    }
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(0,0,0,.25)';
    ctx.stroke();
    ctx.restore();

    if (showRays){
      if (state.red.on)   drawRays(ctx, lights.red,   '#ff5252', shapeVerts);
      if (state.green.on) drawRays(ctx, lights.green, '#3ee881', shapeVerts);
      if (state.blue.on)  drawRays(ctx, lights.blue,  '#5b8dff', shapeVerts);
    }
  }

  function placeHandle(el, x, y){
    el.style.left = (x / W * 100) + '%';
    el.style.top  = (y / H * 100) + '%';
  }
  function syncHandles(){
    placeHandle(lights.red.handle, lights.red.x, lights.red.y);
    placeHandle(lights.green.handle, lights.green.x, lights.green.y);
    placeHandle(lights.blue.handle, lights.blue.x, lights.blue.y);
    placeHandle(obstacle.handle, obstacle.x, obstacle.y);
  }

  let dirty = true;
  function loop(){
    if (dirty){ render(); dirty = false; }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---- 드래그 처리 ----
  function toInternal(clientX, clientY){
    const rect = stage.getBoundingClientRect();
    let x = (clientX - rect.left) / rect.width * W;
    let y = (clientY - rect.top)  / rect.height * H;
    x = Math.max(0, Math.min(W, x));
    y = Math.max(0, Math.min(H, y));
    return {x, y};
  }

  function makeDraggable(handleEl, target){
    handleEl.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      handleEl.setPointerCapture(e.pointerId);
      const move = (ev) => {
        const p = toInternal(ev.clientX, ev.clientY);
        target.x = p.x; target.y = p.y;
        placeHandle(handleEl, p.x, p.y);
        dirty = true;
      };
      const up = (ev) => {
        handleEl.releasePointerCapture(e.pointerId);
        handleEl.removeEventListener('pointermove', move);
        handleEl.removeEventListener('pointerup', up);
      };
      handleEl.addEventListener('pointermove', move);
      handleEl.addEventListener('pointerup', up);
    });
  }
  makeDraggable(lights.red.handle, lights.red);
  makeDraggable(lights.green.handle, lights.green);
  makeDraggable(lights.blue.handle, lights.blue);
  makeDraggable(obstacle.handle, obstacle);

  // 혹시 모를 네이티브 드래그(파일 끌기처럼 동작) 완전 차단
  document.querySelectorAll('.handle').forEach(el => {
    el.addEventListener('dragstart', e => e.preventDefault());
  });

  // ---- 체크박스 / 슬라이더 ----
  function wireControl(key, chkId, sldId){
    const chk = document.getElementById(chkId);
    const sld = document.getElementById(sldId);
    const s = state[key];
    function update(){
      s.on = chk.checked;
      s.strength = sld.value / 100;
      dirty = true;
    }
    chk.addEventListener('change', update);
    sld.addEventListener('input', update);
  }
  wireControl('red', 'chkRed', 'sldRed');
  wireControl('green', 'chkGreen', 'sldGreen');
  wireControl('blue', 'chkBlue', 'sldBlue');

  document.getElementById('chkRays').addEventListener('change', (e) => {
    showRays = e.target.checked;
    dirty = true;
  });

  document.getElementById('selShape').addEventListener('change', (e) => {
    obstacle.shape = e.target.value;
    dirty = true;
  });

  function sizeObjHandle(){
    obstacle.handle.style.width  = (obstacle.r*2 / W * 100) + '%';
    obstacle.handle.style.height = (obstacle.r*2 / H * 100) + '%';
  }
  document.getElementById('sldSize').addEventListener('input', (e) => {
    obstacle.r = Number(e.target.value);
    sizeObjHandle();
    dirty = true;
  });
  sizeObjHandle();

  syncHandles();
})();
</script>

</body>
</html>
