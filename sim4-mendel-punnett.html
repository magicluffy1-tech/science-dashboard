<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>멘델의 가설 검증 유전 실험실 v2</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #06091c; color: #e2e8f0; font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; font-size: 15px; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0F172A; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

    .container { max-width: 820px; margin: 0 auto; padding: 24px 16px; }
    .panel { background: rgba(255,255,255,0.02); border: 2px solid rgba(167,139,250,0.2); border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

    .panel-subtitle { font-size: 13px; color: #c4b5fd; margin-bottom: 8px; font-weight: 800; letter-spacing: 1.5px; text-align: center; }
    .panel-title { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 20px; text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    .text-body { font-size: 15px; color: #94a3b8; line-height: 1.6; word-break: keep-all; }
    .text-highlight { color: #facc15; font-weight: 800; font-size: 1.1em; }
    .text-large { font-size: 18px; font-weight: 800; color: #38bdf8; line-height: 1.5; }

    .btn { padding: 14px 24px; border: none; border-radius: 10px; font-weight: 800; font-size: 16px; cursor: pointer; color: #fff; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.3); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-blue { background: linear-gradient(135deg,#0ea5e9,#4f46e5); }
    .btn-pink { background: linear-gradient(135deg,#c084fc,#ec4899); }
    .btn-green { background: linear-gradient(135deg,#22c55e,#0d9488); }
    .btn-outline { background: rgba(30,41,59,0.5); border: 2px solid rgba(148,163,184,0.4); color: #f8fafc; font-size: 15px; }
    .btn-outline.selected { border-color: #4ade80; background: rgba(74,222,128,0.2); box-shadow: 0 0 15px rgba(74,222,128,0.3); }
    .btn-outline.wrong { border-color: #f87171; background: rgba(248,113,113,0.2); }
    .btn:focus-visible, .btn-outline:focus-visible { outline: 3px solid #38bdf8; outline-offset: 2px; }

    .result-box { background: rgba(56,189,248,0.08); border: 2px solid rgba(56,189,248,0.3); border-radius: 12px; padding: 20px; margin-top: 20px; font-size: 16px; line-height: 1.7; color: #e0f2fe; }
    .feedback-box { border-radius: 10px; padding: 14px 16px; margin-top: 12px; font-size: 14px; line-height: 1.6; text-align: left; }
    .feedback-wrong { background: rgba(248,113,113,0.1); border-left: 4px solid #f87171; color: #fecaca; }
    .feedback-correct { background: rgba(74,222,128,0.1); border-left: 4px solid #4ade80; color: #dcfce7; }

    .pop { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .fade-in { animation: fadeIn 0.6s ease-out forwards; }
    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) { .pop, .fade-in { animation: none; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useReducer, useRef } = React;

    /* ── 완두콩 비주얼 (색각 이상 대응: 패턴 + 라벨 병기) ── */
    function Pea({ round, yellow = true, neutral = false, size = 50, label, className = "" }) {
      const fill = neutral ? (round ? "#e0b97d" : "#d4a373") : (yellow ? "#facc15" : "#4ade80");
      const dark = neutral ? "#8a5a2b" : (yellow ? "#a16207" : "#15803d");
      const patId = "pat-" + (yellow ? "y" : "g") + "-" + (round ? "r" : "w");
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
          <svg className={className} width={size} height={size} viewBox="0 0 40 40" style={{ overflow: "visible" }}>
            <defs>
              <pattern id={patId} width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
                <rect width="6" height="6" fill={fill} />
                {!neutral && !yellow && <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(255,255,255,0.35)" strokeWidth="2" />}
                {!neutral && yellow && <circle cx="3" cy="3" r="0.8" fill="rgba(255,255,255,0.4)" />}
              </pattern>
            </defs>
            {round ? (
              <circle cx="20" cy="20" r="17" fill={`url(#${patId})`} stroke={dark} strokeWidth="2" />
            ) : (
              <path d="M20,4 C26,3 31,7 33,13 C36,16 35,22 31,25 C32,31 26,36 20,34 C14,37 7,32 8,26 C4,23 4,16 8,12 C9,6 14,4 20,4 Z" fill={`url(#${patId})`} stroke={dark} strokeWidth="2" />
            )}
            {!round && [[14,14],[24,12],[28,22],[15,26],[22,24],[12,21]].map(([cx,cy],i) => (
              <circle key={i} cx={cx} cy={cy} r="2" fill={dark} opacity="0.5" />
            ))}
          </svg>
          {label && <div style={{ fontSize: Math.max(10, size * 0.24), fontWeight: 800, color: "#e2e8f0", marginTop: 2 }}>{label}</div>}
        </div>
      );
    }

    function TrendChart({ data }) {
      return (
        <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'center', gap: '16px', height: '180px', margin: '30px 0', borderBottom: '2px solid rgba(255,255,255,0.1)', paddingBottom: '10px' }}>
          {data.map((val, idx) => (
            <div key={idx} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', width: '50px' }}>
              <span style={{ fontSize: '14px', fontWeight: '800', color: '#a78bfa', marginBottom: '8px' }}>{val.toFixed(1)}%</span>
              <div style={{ width: '100%', backgroundColor: 'rgba(167,139,250,0.6)', height: `${(val / 100) * 120}px`, borderRadius: '6px 6px 0 0', transition: 'height 0.4s' }}></div>
              <span style={{ fontSize: '13px', color: '#94a3b8', marginTop: '8px', fontWeight: '700' }}>{idx}세대</span>
            </div>
          ))}
        </div>
      );
    }

    /* ── 가설 검증 박스: 선택지별 개별 피드백 제공 (오개념 교정) ── */
    function HypothesisBox({ question, counterFactual, options, onCorrect }) {
      // options: [{ text, correct: bool, feedback: string }]
      const [picked, setPicked] = useState(null);
      const isCorrect = picked !== null && options[picked].correct;

      useEffect(() => { if (isCorrect) { const t = setTimeout(onCorrect, 900); return () => clearTimeout(t); } }, [isCorrect]);

      return (
        <div className="panel fade-in" style={{ borderColor: "rgba(56,189,248,0.5)", background: "rgba(15,23,42,0.6)" }}>
          <div style={{ background: "rgba(239,68,68,0.1)", borderLeft: "4px solid #ef4444", padding: "12px 16px", marginBottom: 20, textAlign: "left" }}>
            <span style={{ color: "#fca5a5", fontWeight: 700, fontSize: 13, display: "block", marginBottom: 4 }}>[ 반사실적 가정 ]</span>
            <span style={{ color: "#fee2e2", fontSize: 15, lineHeight: 1.5 }}>{counterFactual}</span>
          </div>

          <div className="text-large" style={{ marginBottom: 24 }}>🤔 {question}</div>

          <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap", flexDirection: "column", alignItems: "stretch" }}>
            {options.map((opt, i) => (
              <div key={i} style={{ width: "100%" }}>
                <button onClick={() => setPicked(i)} disabled={isCorrect}
                  style={{ width: "100%", padding: "16px" }}
                  className={`btn btn-outline ${picked === i ? (opt.correct ? 'selected' : 'wrong') : ''}`}>
                  {opt.text}
                </button>
                {picked === i && (
                  <div className={`feedback-box pop ${opt.correct ? 'feedback-correct' : 'feedback-wrong'}`}>
                    {opt.correct ? '✅ ' : '❌ '}{opt.feedback}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function PunnettCell({ isFilled, rowG, colG, onClick, resultLabel, isRound }) {
      return (
        <button onClick={onClick}
          style={{ width: 100, height: 100, background: "rgba(255,255,255,0.03)", border: isFilled ? "3px solid #38bdf8" : "2px dashed rgba(148,163,184,0.3)", borderRadius: 12, display: "flex", flexDirection: "column", cursor: "pointer", alignItems: "center", justifyContent: "center", transition: "all 0.2s" }}>
          {isFilled ? (
            <div className="pop" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
              <Pea round={isRound} neutral size={44} />
              <div style={{ fontSize: 16, fontWeight: 900, color: '#fff', marginTop: 6, letterSpacing: 1 }}>{resultLabel}</div>
            </div>
          ) : <div style={{ fontSize: 32, color: "#475569", fontWeight: 900 }}>?</div>}
        </button>
      );
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // 이항분포 표본 추출 (실제 실험처럼 표본오차 반영)
    function binomialSample(n, p) {
      let successes = 0;
      for (let i = 0; i < n; i++) if (Math.random() < p) successes++;
      return successes;
    }

    /* ── 생식세포 분리 도식: 부모(정적) → 생식세포(1개 대립유전자만) → 결합 ── */
    function GameteSplitDiagram({ parentGenotype, label }) {
      const alleles = parentGenotype.split("");
      const isSame = alleles[0] === alleles[1];
      const round = parentGenotype.includes("R") && isSame ? parentGenotype === "RR" : null;
      return (
        <div style={{ textAlign: "center" }}>
          <Pea round={parentGenotype[0] === "R" || parentGenotype === "RR"} neutral size={64} label={parentGenotype} />
          <div style={{ fontSize: 12, color: "#94a3b8", margin: "6px 0", fontWeight: 700 }}>{label}</div>
          <div style={{ fontSize: 20, color: "#64748b" }}>↓ 감수분열</div>
          <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 6 }}>
            {alleles.map((a, i) => (
              <div key={i} style={{ width: 40, height: 40, borderRadius: "50%", background: "rgba(56,189,248,0.15)", border: "2px solid rgba(56,189,248,0.5)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 16, color: "#7dd3fc" }}>{a}</div>
            ))}
          </div>
          <div style={{ fontSize: 11, color: "#64748b", marginTop: 6 }}>생식세포 (대립유전자 1개씩만 보유)</div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════
       0막 — 순종 고정 분리실
    ══════════════════════════════════════════════════ */
    function Act0PureLine({ onComplete }) {
      const [gen, setGen] = useState(0);
      const [trendData, setTrendData] = useState([100]);
      const [principleSeen, setPrincipleSeen] = useState(false);
      const MAX_GEN = 5;
      const hybridFrac = Math.pow(0.5, gen);
      const homoFrac = (1 - hybridFrac) / 2;

      const handleSelfPollination = () => {
        if (gen >= MAX_GEN) return;
        setGen(g => g + 1);
        setTrendData(prev => [...prev, Math.pow(0.5, gen + 1) * 100]);
      };

      const hybridPct = hybridFrac * 100;
      const homoPct = homoFrac * 100;

      return (
        <div className="panel">
          <div className="panel-subtitle">STEP 0. 실험 준비</div>
          <div className="panel-title" style={{ color: "#a78bfa" }}>자가수분을 통한 순종 분리</div>
          <p className="text-body" style={{ textAlign: "center", marginBottom: 20 }}>
            우리가 눈으로 보는 '둥근 모양' 속에는 '주름진 유전자'가 숨어있을 수 있습니다. <br/>
            정확한 교배 실험을 위해서는 유전자가 100% 동일한 <strong>'순종'</strong>을 만들어야 합니다.
          </p>

          {!principleSeen && (
            <div className="fade-in" style={{ background: "rgba(0,0,0,0.25)", borderRadius: 14, padding: "20px", marginBottom: 24 }}>
              <div className="text-large" style={{ textAlign: "center", marginBottom: 16 }}>🔍 왜 자가수분을 반복하면 잡종 비율이 절반씩 줄어들까요?</div>
              <p className="text-body" style={{ textAlign: "center", marginBottom: 16 }}>
                잡종(Rr)을 자가수분하는 것은 <strong>Rr × Rr</strong> 교배와 똑같습니다. 실제로 1세대만 교배해보면:
              </p>
              <div style={{ display: "flex", justifyContent: "center" }}>
                <div style={{ display: "grid", gridTemplateColumns: `70px repeat(2, 90px)`, gap: 8 }}>
                  <div></div>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, color: "#d8b4fe" }}>♂ R</div>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, color: "#d8b4fe" }}>♂ r</div>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, color: "#fbcfe8" }}>♀ R</div>
                  <div style={{ padding: 10, borderRadius: 10, background: "rgba(74,222,128,0.12)", border: "2px solid rgba(74,222,128,0.4)", textAlign: "center", fontWeight: 900 }}>RR<div style={{ fontSize: 10, color: "#86efac", fontWeight: 700 }}>순종·고정</div></div>
                  <div style={{ padding: 10, borderRadius: 10, background: "rgba(167,139,250,0.12)", border: "2px solid rgba(167,139,250,0.4)", textAlign: "center", fontWeight: 900 }}>Rr<div style={{ fontSize: 10, color: "#c4b5fd", fontWeight: 700 }}>잡종·계속 분리</div></div>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, color: "#fbcfe8" }}>♀ r</div>
                  <div style={{ padding: 10, borderRadius: 10, background: "rgba(167,139,250,0.12)", border: "2px solid rgba(167,139,250,0.4)", textAlign: "center", fontWeight: 900 }}>Rr<div style={{ fontSize: 10, color: "#c4b5fd", fontWeight: 700 }}>잡종·계속 분리</div></div>
                  <div style={{ padding: 10, borderRadius: 10, background: "rgba(74,222,128,0.12)", border: "2px solid rgba(74,222,128,0.4)", textAlign: "center", fontWeight: 900 }}>rr<div style={{ fontSize: 10, color: "#86efac", fontWeight: 700 }}>순종·고정</div></div>
                </div>
              </div>
              <div className="result-box" style={{ marginTop: 20 }}>
                한 세대 만에 <span style={{ color: "#86efac", fontWeight: 800 }}>RR, rr(순종) 50%</span>는 유전자가 하나로 고정되어 이제 자가수분해도 항상 자기 자신만 나옵니다(더 이상 안 갈라짐).<br/>
                반면 <span style={{ color: "#c4b5fd", fontWeight: 800 }}>Rr(잡종) 50%</span>는 다음 세대에 또 이 표를 그대로 반복하게 됩니다.<br/>
                그래서 세대를 거듭할 때마다 <strong>남아있는 잡종의 절반씩</strong>만 순종으로 바뀌고, 잡종 비율은 정확히 <span className="text-highlight">1/2, 1/4, 1/8…</span>로 줄어드는 것입니다.
              </div>
              <div style={{ textAlign: "center", marginTop: 16 }}>
                <button className="btn btn-blue" onClick={() => setPrincipleSeen(true)}>원리 이해했음 → 여러 세대 반복해보기</button>
              </div>
            </div>
          )}

          {principleSeen && (
            <div className="fade-in">
              <TrendChart data={trendData} />

              <div style={{ display: "flex", justifyContent: "space-around", maxWidth: 600, margin: "0 auto 30px", textAlign: "center", background: "rgba(0,0,0,0.2)", padding: "20px", borderRadius: "12px" }}>
                <div>
                  <div style={{ color: "#fff", fontSize: 24, fontWeight: 900 }}>{homoPct.toFixed(1)}%</div>
                  <div style={{ color: "#94a3b8", fontSize: 13, marginTop: 4 }}>순종 (RR / rr)</div>
                </div>
                <div style={{ borderLeft: "2px solid rgba(255,255,255,0.1)", paddingLeft: 40 }}>
                  <div style={{ color: "#a78bfa", fontSize: 24, fontWeight: 900 }}>{hybridPct.toFixed(1)}%</div>
                  <div style={{ color: "#c4b5fd", fontSize: 13, marginTop: 4 }}>잡종 (Rr)</div>
                </div>
              </div>

              <div style={{ textAlign: "center" }}>
                {gen < MAX_GEN ? (
                  <button className="btn btn-blue" onClick={handleSelfPollination}>🔄 자가수분 진행 ({gen}세대)</button>
                ) : (
                  <div className="result-box fade-in">
                    🎯 <strong>핵심 원리</strong>: 방금 확인한 Rr×Rr 퍼넷사각형이 매 세대 반복되면서, 남아있는 잡종의 절반씩만 순종으로 고정되어 잡종(Rr) 비율이 <span className="text-highlight">정확히 절반씩 감소</span>합니다.<br/>
                    순종이 충분히 확보되었으므로, 이제 본격적인 교배 실험을 시작합니다.
                    <div style={{ marginTop: 20 }}><button className="btn btn-pink" onClick={onComplete}>1막: 우열의 원리로 이동 →</button></div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════
       1막 — 우열의 원리
    ══════════════════════════════════════════════════ */
    function Act1Dominance({ onComplete }) {
      const [stage, setStage] = useState("hyp");

      const options = [
        { text: "부모의 형질이 반씩 섞여 '살짝 둥근' 중간 모양이 나온다", correct: false, feedback: "멘델의 완두는 '중간 유전'이 아니라 '완전 우성'을 보입니다. 두 대립유전자가 물리적으로 섞이는 것이 아니라, 각각 독립된 입자(유전자)로 존재하다가 하나만 겉으로 드러납니다." },
        { text: "우성 형질인 둥근 모양만 겉으로 나타나고 주름 유전자는 유전자형 속에 숨는다", correct: true, feedback: "정확합니다. Rr은 유전자형에 r을 그대로 가지고 있지만, 겉모습(표현형)은 우성인 R의 효과만 드러납니다. 이것이 '우열의 원리'입니다." },
        { text: "열성 유전자(r)가 세포에서 사라져 없어진다", correct: false, feedback: "유전자는 소멸되지 않습니다. r은 Rr 안에 그대로 남아있으며, 다음 세대에서 다시 나타날 수 있습니다. 이 내용은 2막에서 직접 확인합니다." },
      ];

      return (
        <div className="fade-in">
          <div className="panel" style={{ borderColor: "rgba(250,204,21,0.3)" }}>
            <div className="panel-subtitle">STEP 1. 첫 번째 교배</div>
            <div className="panel-title" style={{ color: "#facc15" }}>우열의 원리 (Law of Dominance)</div>

            <p className="text-body" style={{ textAlign: "center", marginBottom: 30 }}>
              확보된 순종 둥근 완두(RR)와 순종 주름진 완두(rr)를 교배해봅시다.
            </p>

            <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 40, marginBottom: 30, background: "rgba(0,0,0,0.2)", padding: "30px", borderRadius: "16px" }}>
              <Pea round neutral size={80} label="RR" />
              <div style={{ fontSize: 40, color: "#64748b", fontWeight: 300 }}>×</div>
              <Pea round={false} neutral size={80} label="rr" />
            </div>

            <div style={{ background: "rgba(0,0,0,0.25)", borderRadius: 14, padding: "20px", marginBottom: 10 }}>
              <div style={{ fontSize: 14, color: "#94a3b8", textAlign: "center", marginBottom: 16, fontWeight: 700 }}>
                💡 핵심 전제: 생식세포는 부모의 대립유전자 중 <strong style={{color:"#e2e8f0"}}>딱 1개만</strong> 담아 만들어집니다
              </div>
              <div style={{ display: "flex", justifyContent: "center", gap: 60, flexWrap: "wrap" }}>
                <GameteSplitDiagram parentGenotype="RR" label="순종 둥근" />
                <GameteSplitDiagram parentGenotype="rr" label="순종 주름" />
              </div>
              <div style={{ textAlign: "center", marginTop: 20, fontSize: 20, color: "#64748b" }}>↓ 생식세포끼리 결합</div>
              <div style={{ textAlign: "center", marginTop: 8 }}>
                <div style={{ display: "inline-block", padding: "10px 24px", borderRadius: 10, background: "rgba(167,139,250,0.15)", border: "2px solid rgba(167,139,250,0.4)", fontSize: 22, fontWeight: 900, color: "#e2e8f0", letterSpacing: 2 }}>Rr</div>
                <div style={{ fontSize: 12, color: "#64748b", marginTop: 6 }}>유전자형만 결정됨 — 겉모습(표현형)은 아직 모름</div>
              </div>
              <p className="text-body" style={{ textAlign: "center", marginTop: 12, fontSize: 13 }}>
                RR은 R만 담은 생식세포만, rr은 r만 담은 생식세포만 만들기 때문에 결합 결과는 항상 유전자형 Rr 하나뿐입니다.
                (경우의 수가 1가지뿐이라 여기서는 퍼넷사각형을 그려도 4칸이 모두 같은 답이 나옵니다.) 그렇다면 Rr은 실제로 어떤 모습일까요?</p>
            </div>
          </div>

          {stage === "hyp" && (
            <HypothesisBox
              counterFactual="교배 전에는 우성과 열성이 어떻게 합쳐질지 알 수 없습니다. 여러 가능성을 생각해봅시다."
              question="RR과 rr을 교배하면 자손(F1)의 겉모습은 어떻게 될까요?"
              options={options}
              onCorrect={() => setStage("done")}
            />
          )}

          {stage === "done" && (
            <div className="panel fade-in" style={{ borderColor: "rgba(250,204,21,0.3)", textAlign: "center" }}>
              <div style={{ marginBottom: 20 }}><Pea className="pop" round neutral size={90} label="Rr" /></div>
              <div className="result-box">
                💡 부모로부터 R과 r을 하나씩 물려받아 <span className="text-highlight">유전자형은 Rr</span>이 되었습니다.<br/>
                하지만 겉모습(표현형)은 주름진 모양이 완전히 사라지고 <strong>우성 형질인 둥근 모양만 발현</strong>됩니다.<br/>
                <span style={{ color: "#facc15" }}>주의:</span> r 유전자는 사라진 것이 아니라 Rr 안에 그대로 남아있습니다 — 다음 막에서 확인해봅시다.
              </div>
              <button className="btn btn-pink" style={{ marginTop: 24 }} onClick={onComplete}>2막: 숨겨진 유전자 추적하기 →</button>
            </div>
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════
       2막 — 분리의 법칙
    ══════════════════════════════════════════════════ */
    const act2Reducer = (state, action) => {
      switch(action.type) {
        case 'SET_STAGE': return { ...state, stage: action.payload };
        case 'TOGGLE_CELL':
          const exists = state.filled.includes(action.payload);
          return { ...state, filled: exists ? state.filled.filter(i => i !== action.payload) : [...state.filled, action.payload] };
        case 'FILL_ALL': return { ...state, filled: [0,1,2,3] };
        case 'RESAMPLE': return { ...state, sampleRound: state.sampleRound + 1, sampleSize: action.payload };
        default: return state;
      }
    };

    function Act2Segregation({ onComplete }) {
      const [state, dispatch] = useReducer(act2Reducer, { stage: 'hypothesis', filled: [], sampleRound: 0, sampleSize: 24 });
      const ALLELES = ["R", "r"];

      // 표본오차를 반영한 실제 수확 데이터 (매번 조금씩 다름)
      const roundCount = useMemo(() => binomialSample(state.sampleSize, 0.75), [state.sampleRound, state.sampleSize]);
      const wrinkledCount = state.sampleSize - roundCount;
      const harvest = useMemo(() => shuffle([...Array(roundCount).fill({ round: true }), ...Array(wrinkledCount).fill({ round: false })]), [roundCount, wrinkledCount]);
      const observedRatio = (roundCount / (wrinkledCount || 1));

      const hypOptions = [
        { text: "유전자가 소멸되었으므로 모두 둥근 완두만 나온다", correct: false, feedback: "우열의 원리에서 확인했듯 r 유전자는 소멸되지 않고 Rr 안에 남아있었습니다. 소멸된 것이 아니라면 다시 나타날 가능성을 생각해봐야 합니다." },
        { text: "숨어있던 주름진 완두가 다시 나타난다", correct: true, feedback: "맞습니다. Rr끼리 자가수분하면 생식세포 형성 과정에서 R과 r이 분리되어 각각 다른 생식세포로 들어가고, 그 결합으로 rr(주름) 조합도 다시 만들어집니다." },
        { text: "F1과 똑같이 전부 Rr 유전자형만 나온다", correct: false, feedback: "만약 그렇다면 표현형도 항상 둥근 모양만 나와야 합니다. 하지만 실제로는 RR, Rr, rr 세 가지 유전자형이 모두 나타납니다. 왜 그런지 아래에서 직접 확인해봅시다." },
      ];

      return (
        <div className="fade-in">
          <div className="panel" style={{ borderColor: "rgba(56,189,248,0.3)" }}>
            <div className="panel-subtitle">STEP 2. 자가 수분</div>
            <div className="panel-title" style={{ color: "#38bdf8" }}>분리의 법칙 (Law of Segregation)</div>

            {state.stage === 'hypothesis' && (
              <HypothesisBox
                counterFactual="만약 1막에서 열성 유전자(r)가 둥근 유전자(R)에 의해 완전히 파괴되거나 소멸되었다면, 자손은 영원히 둥근 완두만 나와야 합니다."
                question="실제 F1(Rr)을 다시 자가수분시켜 키우면 어떤 결과가 나타날까요?"
                options={hypOptions}
                onCorrect={() => dispatch({ type: 'SET_STAGE', payload: 'harvest' })}
              />
            )}

            {state.stage === 'harvest' && (
              <div className="fade-in" style={{ textAlign: "center" }}>
                <div style={{ fontSize: 18, color: "#e2e8f0", marginBottom: 20, fontWeight: 800 }}>
                  🌱 실제 수확된 {state.sampleSize}개의 완두콩 데이터 (시도 {state.sampleRound + 1}회)
                </div>
                <div style={{ display: "grid", gridTemplateColumns: `repeat(${state.sampleSize > 24 ? 15 : 8}, 1fr)`, gap: 10, maxWidth: 560, margin: "0 auto 24px", background: "rgba(0,0,0,0.3)", padding: "20px", borderRadius: "16px", maxHeight: 260, overflowY: "auto" }}>
                  {harvest.map((it, i) => <Pea key={i} className="pop" round={it.round} neutral size={state.sampleSize > 24 ? 22 : 36} style={{ animationDelay: `${Math.min(i,20) * 0.02}s` }} />)}
                </div>

                <div className="result-box" style={{ background: "rgba(244,114,182,0.1)", borderColor: "rgba(244,114,182,0.3)", color: "#fbcfe8" }}>
                  <span className="text-highlight" style={{ fontSize: 22, display: "block", marginBottom: 10 }}>
                    둥근 모양 {roundCount}개 : 주름진 모양 {wrinkledCount}개 (실제 관찰비 {observedRatio.toFixed(2)} : 1)
                  </span>
                  이론적으로 기대되는 비율은 <strong>3 : 1 (2.00 : 1)</strong>입니다. 실제 표본에서는 우연(표본오차) 때문에 정확히 3:1이 아닐 수 있습니다.<br/>
                  <span style={{ color: "#94a3b8", fontSize: 13 }}>👉 아래에서 표본 수를 늘려 이론값에 더 가까워지는지 확인해보세요.</span>
                </div>

                <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 16, flexWrap: "wrap" }}>
                  <button className="btn btn-outline" onClick={() => dispatch({ type: 'RESAMPLE', payload: 24 })}>🔁 24개 다시 수확 (표본 오차 확인)</button>
                  <button className="btn btn-outline" onClick={() => dispatch({ type: 'RESAMPLE', payload: 240 })}>📈 240개로 표본 늘리기</button>
                </div>
                <button className="btn btn-blue" style={{ marginTop: 20 }} onClick={() => dispatch({ type: 'SET_STAGE', payload: 'punnett' })}>🧮 퍼넷 사각형으로 이론적 확률 검증</button>
              </div>
            )}

            {state.stage === 'punnett' && (
              <div className="fade-in">
                <div className="text-large" style={{ textAlign: "center", marginBottom: 12 }}>퍼넷 사각형의 빈칸을 직접 클릭하여 채워보세요</div>
                <div style={{ fontSize: 14, color: "#94a3b8", textAlign: "center", marginBottom: 30 }}>각 생식세포가 만나 결합될 확률을 시각적으로 확인합니다.</div>

                <div style={{ display: "flex", justifyContent: "center", marginBottom: 20 }}>
                  <div style={{ display: "grid", gridTemplateColumns: `80px repeat(2, 1fr)`, gap: 10 }}>
                    <div></div>
                    {ALLELES.map(g => <div key={'c'+g} style={{ background: "rgba(167,139,250,0.15)", display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 12, fontSize: 22, fontWeight: 900, color: "#d8b4fe" }}>♂ {g}</div>)}

                    {ALLELES.map((rowG, ri) => (
                      <React.Fragment key={'r'+rowG}>
                        <div style={{ background: "rgba(244,114,182,0.15)", display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 12, fontSize: 22, fontWeight: 900, color: "#fbcfe8" }}>♀ {rowG}</div>
                        {ALLELES.map((colG, ci) => {
                          const idx = ri * 2 + ci;
                          const genotype = [rowG, colG].sort().reverse().join(""); // R 먼저 오도록 표기
                          const isRound = genotype.includes("R");
                          return <PunnettCell key={idx} isFilled={state.filled.includes(idx)} rowG={rowG} colG={colG} resultLabel={genotype} isRound={isRound} onClick={() => dispatch({ type: 'TOGGLE_CELL', payload: idx })} />
                        })}
                      </React.Fragment>
                    ))}
                  </div>
                </div>

                <div style={{ textAlign: "center" }}>
                  {state.filled.length < 4 ? (
                    <button className="btn btn-outline" onClick={() => dispatch({ type: 'FILL_ALL' })}>⚡ 전체 자동 채우기</button>
                  ) : (
                    <div className="result-box fade-in">
                      <div style={{ display: "flex", justifyContent: "center", gap: 30, flexWrap: "wrap", marginBottom: 16 }}>
                        <div>
                          <div style={{ fontSize: 13, color: "#94a3b8", fontWeight: 700 }}>유전자형 비율</div>
                          <div style={{ fontSize: 22, fontWeight: 900, color: "#a78bfa" }}>RR : Rr : rr = 1 : 2 : 1</div>
                        </div>
                        <div>
                          <div style={{ fontSize: 13, color: "#94a3b8", fontWeight: 700 }}>표현형 비율</div>
                          <div style={{ fontSize: 22, fontWeight: 900, color: "#facc15" }}>둥근 : 주름 = 3 : 1</div>
                        </div>
                      </div>
                      🎯 대립유전자가 생식세포 형성 시 서로 분리되어 들어간다는 <strong>분리의 법칙</strong> 덕분에 RR, Rr(2가지 조합), rr이 1:2:1로 만들어지고,
                      Rr이 우열의 원리에 의해 둥근 모양으로 보이므로 겉모습은 <span className="text-highlight">3:1</span>이 됩니다.<br/>
                      <span style={{ fontSize: 13, color: "#94a3b8" }}>즉, 유전자형 비율(1:2:1)과 표현형 비율(3:1)은 같은 현상을 서로 다른 눈금으로 보는 것입니다.</span>
                      <div style={{ marginTop: 24 }}><button className="btn btn-blue" onClick={onComplete}>3막: 두 가지 형질 동시 고려하기 →</button></div>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════
       3막 — 독립의 법칙 (직접 채우는 4x4 두 형질 퍼넷사각형)
    ══════════════════════════════════════════════════ */
    function Act3Independence({ onComplete }) {
      const [stage, setStage] = useState("hypothesis");
      const [filled, setFilled] = useState([]);
      const gametes = ["RY", "Ry", "rY", "ry"];

      const hypOptions = [
        { text: "서로 묶여서 간섭하여 새로운 복잡한 비율이 나온다", correct: false, feedback: "모양 유전자와 색깔 유전자가 서로 다른 염색체에 있다면 감수분열 과정에서 독립적으로 배열됩니다. 함께 묶여 이동한다는 근거가 없다면 이 가설은 성립하기 어렵습니다." },
        { text: "서로 간섭 없이 독립적으로 움직여 각각의 확률이 곱해진다", correct: true, feedback: "정확합니다. 서로 다른 형질을 결정하는 유전자가 다른 염색체에 있으면, 생식세포 형성 시 독립적으로 분리·조합됩니다. 그 결과 두 형질의 확률을 곱한 값이 실제 비율이 됩니다." },
        { text: "두 형질 중 하나만 무작위로 사라진다", correct: false, feedback: "형질이 무작위로 사라지는 현상은 관찰되지 않습니다. 모양과 색깔 모두 각자의 3:1 비율을 유지한 채 함께 나타납니다." },
      ];

      const genotypeOf = (g1, g2) => {
        const shape = [g1[0], g2[0]].sort().reverse().join("");
        const color = [g1[1], g2[1]].sort().reverse().join("");
        return { shape, color, round: shape.includes("R"), yellow: color.includes("Y") };
      };

      const allFilled = filled.length === 16;

      // 4x4 결과 집계로 9:3:3:1 실제 계산해서 보여주기
      const counts = useMemo(() => {
        let c = { roundYellow: 0, roundGreen: 0, wrinkledYellow: 0, wrinkledGreen: 0 };
        gametes.forEach(g1 => gametes.forEach(g2 => {
          const { round, yellow } = genotypeOf(g1, g2);
          if (round && yellow) c.roundYellow++;
          else if (round && !yellow) c.roundGreen++;
          else if (!round && yellow) c.wrinkledYellow++;
          else c.wrinkledGreen++;
        }));
        return c;
      }, []);

      return (
        <div className="fade-in">
          <div className="panel" style={{ borderColor: "rgba(74,222,128,0.3)" }}>
            <div className="panel-subtitle">STEP 3. 확장된 교배</div>
            <div className="panel-title" style={{ color: "#4ade80" }}>독립의 법칙 (Law of Independent Assortment)</div>

            {stage === "hypothesis" && (
              <HypothesisBox
                counterFactual="만약 완두의 '모양(둥글/주름)'과 '색깔(황/녹)' 유전자가 하나의 끈으로 강하게 묶여 함께 이동한다면, 3:1 비율의 구조가 깨질 것입니다."
                question="두 형질을 동시에 교배할 때(RrYy × RrYy), 모양 유전자와 색깔 유전자는 서로 간섭할까요?"
                options={hypOptions}
                onCorrect={() => setStage("punnett")}
              />
            )}

            {stage === "punnett" && (
              <div className="fade-in">
                <div className="text-large" style={{ textAlign: "center", marginBottom: 6 }}>RrYy × RrYy 의 4×4 퍼넷 사각형을 직접 채워보세요</div>
                <div style={{ fontSize: 13, color: "#94a3b8", textAlign: "center", marginBottom: 20 }}>생식세포는 RY, Ry, rY, ry 네 종류가 같은 확률(각 1/4)로 만들어집니다.</div>

                <div style={{ display: "flex", justifyContent: "center", marginBottom: 20, overflowX: "auto" }}>
                  <div style={{ display: "grid", gridTemplateColumns: `70px repeat(4, 74px)`, gap: 6 }}>
                    <div></div>
                    {gametes.map(g => <div key={'c'+g} style={{ background: "rgba(167,139,250,0.15)", display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 8, fontSize: 14, fontWeight: 900, color: "#d8b4fe" }}>♂{g}</div>)}
                    {gametes.map((rowG, ri) => (
                      <React.Fragment key={'r'+rowG}>
                        <div style={{ background: "rgba(244,114,182,0.15)", display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 8, fontSize: 14, fontWeight: 900, color: "#fbcfe8" }}>♀{rowG}</div>
                        {gametes.map((colG, ci) => {
                          const idx = ri * 4 + ci;
                          const { shape, color, round, yellow } = genotypeOf(rowG, colG);
                          const isFilled = filled.includes(idx);
                          return (
                            <button key={idx} onClick={() => setFilled(f => f.includes(idx) ? f.filter(x=>x!==idx) : [...f, idx])}
                              style={{ width: 74, height: 74, background: "rgba(255,255,255,0.03)", border: isFilled ? "2px solid #38bdf8" : "2px dashed rgba(148,163,184,0.3)", borderRadius: 8, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
                              {isFilled ? (
                                <div className="pop" style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
                                  <Pea round={round} yellow={yellow} size={30} />
                                  <div style={{ fontSize: 10, fontWeight: 800, marginTop: 2 }}>{shape}{color}</div>
                                </div>
                              ) : <div style={{ fontSize: 20, color: "#475569", fontWeight: 900 }}>?</div>}
                            </button>
                          );
                        })}
                      </React.Fragment>
                    ))}
                  </div>
                </div>

                <div style={{ textAlign: "center" }}>
                  {!allFilled ? (
                    <button className="btn btn-outline" onClick={() => setFilled(Array.from({length:16}, (_,i)=>i))}>⚡ 전체 자동 채우기</button>
                  ) : (
                    <div className="fade-in">
                      <div style={{ display: "flex", justifyContent: "center", gap: 16, flexWrap: "wrap", margin: "16px 0" }}>
                        <div style={{ background: "rgba(0,0,0,0.3)", padding: "12px 16px", borderRadius: 10 }}><Pea round yellow size={28} /><div style={{ fontSize: 12, marginTop: 4 }}>둥근×황 {counts.roundYellow}</div></div>
                        <div style={{ background: "rgba(0,0,0,0.3)", padding: "12px 16px", borderRadius: 10 }}><Pea round yellow={false} size={28} /><div style={{ fontSize: 12, marginTop: 4 }}>둥근×녹 {counts.roundGreen}</div></div>
                        <div style={{ background: "rgba(0,0,0,0.3)", padding: "12px 16px", borderRadius: 10 }}><Pea round={false} yellow size={28} /><div style={{ fontSize: 12, marginTop: 4 }}>주름×황 {counts.wrinkledYellow}</div></div>
                        <div style={{ background: "rgba(0,0,0,0.3)", padding: "12px 16px", borderRadius: 10 }}><Pea round={false} yellow={false} size={28} /><div style={{ fontSize: 12, marginTop: 4 }}>주름×녹 {counts.wrinkledGreen}</div></div>
                      </div>
                      <button className="btn btn-green" onClick={() => setStage("conclusion")}>결과 분석하기 →</button>
                    </div>
                  )}
                </div>
              </div>
            )}

            {stage === "conclusion" && (
              <div className="fade-in" style={{ textAlign: "center" }}>
                <div style={{ display: "flex", justifyContent: "center", gap: 30, marginBottom: 30, flexWrap: "wrap" }}>
                  <div style={{ background: "rgba(0,0,0,0.3)", padding: "20px", borderRadius: "16px", flex: 1, minWidth: 140 }}>
                    <div style={{ color: "#94a3b8", fontSize: 14, marginBottom: 10, fontWeight: 800 }}>모양의 확률</div>
                    <div style={{ fontSize: 24, fontWeight: 900, color: "#fff" }}>3 : 1</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", fontSize: 32, color: "#64748b" }}>×</div>
                  <div style={{ background: "rgba(0,0,0,0.3)", padding: "20px", borderRadius: "16px", flex: 1, minWidth: 140 }}>
                    <div style={{ color: "#94a3b8", fontSize: 14, marginBottom: 10, fontWeight: 800 }}>색깔의 확률</div>
                    <div style={{ fontSize: 24, fontWeight: 900, color: "#fff" }}>3 : 1</div>
                  </div>
                </div>

                <div className="result-box" style={{ background: "rgba(74,222,128,0.1)", borderColor: "rgba(74,222,128,0.3)" }}>
                  <div style={{ fontSize: 32, fontWeight: 900, color: "#4ade80", marginBottom: 16, letterSpacing: 2 }}>
                    {counts.roundYellow} : {counts.roundGreen} : {counts.wrinkledYellow} : {counts.wrinkledGreen} <span style={{fontSize:18, color:"#94a3b8"}}>(= 9:3:3:1)</span>
                  </div>
                  방금 직접 채운 16칸을 세어보면 둥근·황 : 둥근·녹 : 주름·황 : 주름·녹 = 9:3:3:1이 나옵니다.<br/>
                  각 형질의 3:1 비율이 서로 간섭하지 않고 독립적으로 작용하여 <strong>확률의 곱셈 규칙</strong>이 성립함을 직접 확인했습니다.<br/>
                  이처럼 서로 다른 염색체에 위치한 대립유전자가 독립적으로 유전되는 현상을 <span className="text-highlight">독립의 법칙</span>이라고 합니다.
                </div>

                <button className="btn btn-pink" style={{ marginTop: 30, padding: "16px 32px" }} onClick={onComplete}>4막: 종합 이해도 점검 →</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════
       4막 — 종합 이해도 점검 (퀴즈 + 진행기록 저장)
    ══════════════════════════════════════════════════ */
    const QUIZ = [
      {
        q: "Rr × Rr 교배에서 자손의 유전자형 비율은?",
        options: [
          { text: "RR : Rr : rr = 1 : 2 : 1", correct: true, feedback: "맞습니다. 분리의 법칙에 따라 생식세포가 R, r로 나뉘어 결합하면 1:2:1 비율이 나옵니다." },
          { text: "RR : Rr : rr = 1 : 1 : 1", correct: false, feedback: "Rr 조합은 (부 R, 모 r)과 (부 r, 모 R) 두 경우로 만들어져 다른 조합보다 2배 많습니다." },
          { text: "표현형 비율과 똑같이 3 : 1이다", correct: false, feedback: "3:1은 '표현형' 비율입니다. '유전자형' 비율은 RR, Rr, rr을 구분해서 세므로 1:2:1이 됩니다." },
        ],
      },
      {
        q: "우열의 원리에서 Rr의 겉모습(표현형)은 어떻게 되나요?",
        options: [
          { text: "우성인 둥근 모양만 나타난다", correct: true, feedback: "맞습니다. 열성 유전자는 유전자형에는 남아있지만 표현형으로는 드러나지 않습니다." },
          { text: "둥근 모양과 주름 모양이 무늬처럼 섞여 나타난다", correct: false, feedback: "멘델의 완두는 중간 유전이 아니라 완전 우성이므로 섞여서 보이지 않습니다." },
        ],
      },
      {
        q: "실제 실험에서 24개의 표본을 수확했더니 17:7이 나왔습니다. 이 결과가 뜻하는 것은?",
        options: [
          { text: "분리의 법칙이 틀렸으므로 폐기해야 한다", correct: false, feedback: "작은 표본에서는 우연(표본오차)에 의해 이론값(3:1=18:6)과 정확히 일치하지 않을 수 있습니다. 표본을 늘리면 이론값에 가까워집니다." },
          { text: "표본 수가 적어 생긴 우연한 오차일 수 있으므로 표본을 늘려 재확인해야 한다", correct: true, feedback: "정확합니다. 과학적 법칙은 한 번의 표본으로 기각하지 않고, 표본 크기를 늘려 이론값과 비교하는 것이 올바른 검증 방법입니다." },
        ],
      },
      {
        q: "RrYy × RrYy를 교배했을 때 나오는 표현형 비율은?",
        options: [
          { text: "9 : 3 : 3 : 1", correct: true, feedback: "맞습니다. 모양(3:1)과 색깔(3:1)이 독립적으로 곱해져 9:3:3:1이 됩니다." },
          { text: "3 : 3 : 1 : 1", correct: false, feedback: "두 형질이 독립적으로 곱해질 때는 3×3=9, 3×1=3, 1×3=3, 1×1=1의 곱셈 규칙이 적용됩니다." },
        ],
      },
    ];

    function Act4Quiz({ onRestart, saveResult }) {
      const [idx, setIdx] = useState(0);
      const [picked, setPicked] = useState(null);
      const [score, setScore] = useState(0);
      const [done, setDone] = useState(false);

      const current = QUIZ[idx];
      const isCorrect = picked !== null && current.options[picked].correct;

      const handleNext = () => {
        if (idx + 1 < QUIZ.length) { setIdx(idx + 1); setPicked(null); }
        else { setDone(true); saveResult(score + (isCorrect ? 1 : 0)); }
      };

      const handlePick = (i) => {
        if (picked !== null && isCorrect) return;
        setPicked(i);
        if (current.options[i].correct && picked === null) setScore(s => s + 1);
      };

      if (done) {
        return (
          <div className="panel fade-in" style={{ borderColor: "rgba(250,204,21,0.4)", textAlign: "center" }}>
            <div className="panel-subtitle">STEP 4. 종합 점검 결과</div>
            <div className="panel-title" style={{ color: "#facc15" }}>학습 완료!</div>
            <div style={{ fontSize: 40, fontWeight: 900, color: "#4ade80", marginBottom: 12 }}>{score} / {QUIZ.length}</div>
            <p className="text-body" style={{ marginBottom: 24 }}>
              우열의 원리, 분리의 법칙, 독립의 법칙을 모두 직접 실험하고 검증했습니다.<br/>
              결과는 이 브라우저에 저장되어 다음에 이어서 확인할 수 있습니다.
            </p>
            <button className="btn btn-outline" onClick={onRestart}>처음부터 다시 실험하기 ↺</button>
          </div>
        );
      }

      return (
        <div className="panel fade-in" style={{ borderColor: "rgba(250,204,21,0.4)" }}>
          <div className="panel-subtitle">STEP 4. 종합 이해도 점검 ({idx + 1} / {QUIZ.length})</div>
          <div className="panel-title" style={{ color: "#facc15" }}>세 가지 법칙 총정리 퀴즈</div>
          <div className="text-large" style={{ marginBottom: 20 }}>{current.q}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {current.options.map((opt, i) => (
              <div key={i}>
                <button className={`btn btn-outline ${picked === i ? (opt.correct ? 'selected' : 'wrong') : ''}`} style={{ width: "100%", padding: 14 }} onClick={() => handlePick(i)}>
                  {opt.text}
                </button>
                {picked === i && (
                  <div className={`feedback-box pop ${opt.correct ? 'feedback-correct' : 'feedback-wrong'}`}>
                    {opt.correct ? '✅ ' : '❌ '}{opt.feedback}
                  </div>
                )}
              </div>
            ))}
          </div>
          {picked !== null && (
            <div style={{ textAlign: "center", marginTop: 20 }}>
              <button className="btn btn-blue" onClick={handleNext}>{idx + 1 < QUIZ.length ? "다음 문제 →" : "결과 확인하기"}</button>
            </div>
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════
       메인 앱 컨트롤러 (진행 상황 저장/복원 포함)
    ══════════════════════════════════════════════════ */
    function App() {
      const [act, setAct] = useState(0);
      const [maxUnlocked, setMaxUnlocked] = useState(0);
      const [resetKey, setResetKey] = useState(0);
      const [loaded, setLoaded] = useState(false);
      const [showResume, setShowResume] = useState(false);
      const [lastScore, setLastScore] = useState(null);

      useEffect(() => {
        (async () => {
          try {
            const res = await window.storage.get('mendel_progress');
            if (res && res.value) {
              const data = JSON.parse(res.value);
              if (data.maxUnlocked > 0) {
                setMaxUnlocked(data.maxUnlocked);
                setLastScore(typeof data.quizScore === 'number' ? data.quizScore : null);
                setShowResume(true);
              }
            }
          } catch (e) { /* 저장된 기록 없음 */ }
          setLoaded(true);
        })();
      }, []);

      const persist = async (nextMax, quizScore) => {
        try {
          await window.storage.set('mendel_progress', JSON.stringify({ maxUnlocked: nextMax, quizScore: quizScore ?? lastScore, updatedAt: Date.now() }));
        } catch (e) { /* 저장 실패 시 무시 - 학습 진행에는 영향 없음 */ }
      };

      const goAct = n => { setAct(n); setMaxUnlocked(m => { const nm = Math.max(m, n); persist(nm); return nm; }); };
      const restart = async () => {
        setAct(0); setMaxUnlocked(0); setResetKey(k => k + 1); setLastScore(null);
        try { await window.storage.delete('mendel_progress'); } catch (e) {}
      };
      const saveQuizResult = (score) => { setLastScore(score); persist(maxUnlocked, score); };

      if (!loaded) return null;

      return (
        <div className="container">
          <header style={{ textAlign: "center", marginBottom: 24 }}>
            <div style={{ fontSize: 12, letterSpacing: 6, color: "#38bdf8", fontWeight: 800, marginBottom: 8 }}>MENDEL INQUIRY LAB</div>
            <h1 style={{ fontSize: 32, fontWeight: 900, background: "linear-gradient(90deg,#e0f2fe 0%,#38bdf8 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", margin: 0 }}>
              멘델의 가설 검증 유전 실험실
            </h1>
          </header>

          {showResume && (
            <div className="panel fade-in" style={{ borderColor: "rgba(56,189,248,0.4)", textAlign: "center" }}>
              <p className="text-body" style={{ marginBottom: 4 }}>
                이전에 <strong style={{ color: "#38bdf8" }}>{maxUnlocked}막</strong>까지 진행한 기록이 있습니다.
                {lastScore !== null && <> (종합 퀴즈 {lastScore}/{QUIZ.length}점)</>}
              </p>
              <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 12 }}>
                <button className="btn btn-blue" onClick={() => { setAct(maxUnlocked); setShowResume(false); }}>이어서 학습하기</button>
                <button className="btn btn-outline" onClick={() => { restart(); setShowResume(false); }}>처음부터 다시하기</button>
              </div>
            </div>
          )}

          {!showResume && (
            <React.Fragment>
              <div style={{ display: "flex", justifyContent: "center", gap: 10, marginBottom: 30, flexWrap: "wrap" }}>
                {[0, 1, 2, 3, 4].map(n => (
                  <button key={n} onClick={() => n <= maxUnlocked && goAct(n)} disabled={n > maxUnlocked}
                    style={{ padding: "10px 18px", borderRadius: "24px", border: "none", background: act === n ? "linear-gradient(135deg,#0ea5e9,#4f46e5)" : n <= maxUnlocked ? "rgba(56,189,248,0.15)" : "rgba(30,41,59,0.5)", color: act === n ? "#fff" : n <= maxUnlocked ? "#7dd3fc" : "#475569", fontSize: 14, fontWeight: 800, cursor: n <= maxUnlocked ? "pointer" : "default", transition: "all 0.2s" }}>
                    {n}막
                  </button>
                ))}
              </div>

              <div key={resetKey}>
                {act === 0 && <Act0PureLine onComplete={() => goAct(1)} />}
                {act === 1 && <Act1Dominance onComplete={() => goAct(2)} />}
                {act === 2 && <Act2Segregation onComplete={() => goAct(3)} />}
                {act === 3 && <Act3Independence onComplete={() => goAct(4)} />}
                {act === 4 && <Act4Quiz onRestart={restart} saveResult={saveQuizResult} />}
              </div>
            </React.Fragment>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
