<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>멘델의 가설 검증 유전 실험실</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #06091c; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0F172A; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;


/* ══════════════════════════════════════════════════
   멘델의 가설 검증 실험실 (버그 수정판)
   0막 순종 분리실 (해석적 비율 계산 — 거대 배열 없이 정확하고 가벼움)
   1막 우열의 원리 (순종 RR × rr 교배 및 우성 발현)
   2막 분리의 법칙 (F1 자가수분, 3:1 분리)
   3막 독립의 법칙 (양성잡종 독립 분리, 9:3:3:1)
══════════════════════════════════════════════════ */

/* ── 완두콩 비주얼 (SVG) ──────────────────────────── */
function Pea({ round, yellow = true, neutral = false, size = 34 }) {
  const fill = neutral ? (round ? "#e0b97d" : "#d4a373") : (yellow ? "#facc15" : "#4ade80");
  const dark = neutral ? "#8a5a2b" : (yellow ? "#a16207" : "#15803d");

  if (round) {
    return (
      <svg width={size} height={size} viewBox="0 0 40 40" style={{ overflow: "visible" }}>
        <circle cx="20" cy="20" r="17" fill={fill} stroke={dark} strokeWidth="1.5" />
        <ellipse cx="14" cy="13" rx="5" ry="3.5" fill="#fff" opacity="0.4" />
      </svg>
    );
  }
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" style={{ overflow: "visible" }}>
      <path
        d="M20,4 C26,3 31,7 33,13 C36,16 35,22 31,25 C32,31 26,36 20,34
           C14,37 7,32 8,26 C4,23 4,16 8,12 C9,6 14,4 20,4 Z"
        fill={fill} stroke={dark} strokeWidth="1.5"
      />
      {[[14,14],[24,12],[28,22],[15,26],[22,24],[12,21]].map(([cx,cy],i) => (
        <circle key={i} cx={cx} cy={cy} r="1.8" fill={dark} opacity="0.5" />
      ))}
    </svg>
  );
}

function GenotypeLabel({ text, fontSize = 11 }) {
  return (
    <div style={{ fontSize, fontFamily: "monospace", letterSpacing: 0.5, fontWeight: 700 }}>
      {text.split("").map((char, i) => {
        const isUpper = char === char.toUpperCase();
        return <span key={i} style={{ color: isUpper ? "#ffffff" : "#64748b" }}>{char}</span>;
      })}
    </div>
  );
}

function Btn({ children, onClick, disabled, style: ex }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      padding: "10px 18px", border: "none", borderRadius: 8, fontWeight: 700,
      fontSize: 13, cursor: disabled ? "not-allowed" : "pointer", color: "#fff",
      opacity: disabled ? 0.35 : 1, fontFamily: "inherit", transition: "all 0.2s", ...ex,
    }}>{children}</button>
  );
}

/* ── 라벨 없는 수확물 그리드 (귀납적 관찰용) ─────── */
function HarvestGrid({ items, size = 24 }) {
  return (
    <div style={{
      display: "grid", gridTemplateColumns: "repeat(8, 1fr)", gap: 7,
      maxWidth: 300, margin: "0 auto", background: "rgba(0,0,0,0.15)",
      padding: 12, borderRadius: 10,
    }}>
      {items.map((it, i) => (
        <Pea key={i} round={it.round} yellow={it.yellow} neutral={it.yellow === undefined} size={size} />
      ))}
    </div>
  );
}

/* ── 배열 셔플 (표시 순서만 무작위화, 개수는 고정) ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ── 객관식 선택 → 스스로 규칙을 추론하게 하는 컴포넌트 ── */
function ChoiceButtons({ options, correctIndex, onCorrect, correctFeedback }) {
  const [picked, setPicked] = useState(null);
  const [confirmed, setConfirmed] = useState(false);
  const isCorrect = picked === correctIndex;

  useEffect(() => {
    if (isCorrect && !confirmed) {
      setConfirmed(true);
      onCorrect && onCorrect();
    }
  }, [isCorrect]); // eslint-disable-line react-hooks/exhaustive-deps

  return (
    <div>
      <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap", marginBottom: picked !== null ? 10 : 4 }}>
        {options.map((opt, i) => {
          const selected = picked === i;
          const showWrong = selected && !isCorrect;
          const showRight = selected && isCorrect;
          return (
            <button
              key={i}
              onClick={() => setPicked(i)}
              disabled={isCorrect}
              style={{
                padding: "9px 15px", borderRadius: 8, cursor: isCorrect ? "default" : "pointer",
                border: showRight ? "1.5px solid #4ade80" : showWrong ? "1.5px solid #f87171" : "1px solid rgba(148,163,184,0.3)",
                background: showRight ? "rgba(74,222,128,0.15)" : showWrong ? "rgba(248,113,113,0.15)" : "rgba(255,255,255,0.03)",
                color: "#e2e8f0", fontSize: 12.5, fontWeight: 700, fontFamily: "inherit",
              }}
            >
              {opt}
            </button>
          );
        })}
      </div>
      {picked !== null && !isCorrect && (
        <div style={{ fontSize: 11, color: "#fca5a5", textAlign: "center", marginBottom: 6 }}>
          🤔 다시 한 번 살펴볼까요? 위 숫자들을 잘 비교해보세요.
        </div>
      )}
      {isCorrect && (
        <div style={{
          fontSize: 12, color: "#86efac", textAlign: "center", lineHeight: 1.7,
          background: "rgba(74,222,128,0.06)", border: "1px solid rgba(74,222,128,0.2)",
          borderRadius: 10, padding: "10px 13px", marginTop: 4,
        }}>
          ✅ {correctFeedback}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   0막 — 순종 고정 분리실
   [버그 수정 ③] 거대 배열을 누적 증식시키지 않고, 세대별 비율을
   해석적으로 계산한다 (Rr 비율 = (1/2)^gen). 메모리·연산 부담 없음.
   [버그 수정 ②] "완전 소멸"이라는 과장된 메시지 대신, 비율이
   점근적으로 줄어들 뿐 0이 되지 않는다는 사실을 정직하게 안내.
══════════════════════════════════════════════════ */
function Act0PureLine({ onComplete }) {
  const [gen, setGen] = useState(0);
  const [isAnimate, setIsAnimate] = useState(false);
  const [pnFilled, setPnFilled] = useState([]);
  const ALLELES2 = ["R", "r"];
  const MAX_GEN = 5;

  // 해석적 계산: Rr 비율은 매 세대 정확히 절반(1/2)^gen,
  // 남은 절반은 RR과 rr에 균등하게 나뉜다.
  const hybridFrac = Math.pow(0.5, gen);
  const homoFrac = (1 - hybridFrac) / 2; // RR 비율 = rr 비율

  const handleSelfPollination = () => {
    if (gen >= MAX_GEN) return;
    setIsAnimate(true);
    setTimeout(() => {
      setGen(g => g + 1);
      setIsAnimate(false);
    }, 400);
  };

  // 화면 표시용 16칸은 현재 비율에 따라 가중 무작위로 뽑는다 (연출용, 실제 데이터는 비율로 관리)
  const displayPool = useMemo(() => {
    const arr = [];
    for (let i = 0; i < 16; i++) {
      const r = Math.random();
      if (r < homoFrac) arr.push("RR");
      else if (r < homoFrac + hybridFrac) arr.push("Rr");
      else arr.push("rr");
    }
    return arr;
  }, [gen]); // eslint-disable-line react-hooks/exhaustive-deps

  const togglePn = (idx) => {
    setPnFilled(f => f.includes(idx) ? f.filter(i => i !== idx) : [...f, idx]);
  };
  const pnCounts = useMemo(() => {
    const c = { RR: 0, Rr: 0, rr: 0 };
    pnFilled.forEach(idx => {
      const r = Math.floor(idx / 2), col = idx % 2;
      const combo = [ALLELES2[r], ALLELES2[col]].sort((a,b)=>a==="R"?-1:1).join("");
      c[combo] = (c[combo] || 0) + 1;
    });
    return c;
  }, [pnFilled]);
  const pnAllDone = pnFilled.length === 4;

  const hybridPct = hybridFrac * 100;
  const homoPct = homoFrac * 100;
  const stopped = gen >= MAX_GEN;

  return (
    <div style={{
      background: "rgba(255,255,255,0.018)", border: "1px solid rgba(167,139,250,0.2)",
      borderRadius: 14, padding: "16px", marginBottom: 14,
    }}>
      <div style={{ fontSize: 10, color: "#cbd5e1", marginBottom: 4, textAlign: "center", fontWeight: 700, letterSpacing: 2 }}>
        사전 준비 — 실험에 사용할 '순종' 완두콩은 어떻게 얻을까?
      </div>
      <div style={{ fontSize: 14, fontWeight: 800, color: "#a78bfa", textAlign: "center", marginBottom: 6 }}>
        0막 · 자가수분을 통한 순종 분리 (Pure-line Selection)
      </div>
      <p style={{ fontSize: 11.5, color: "#64748b", textAlign: "center", margin: "0 auto 14px", maxWidth: 520, lineHeight: 1.5 }}>
        겉모습이 둥글더라도 속에는 주름진 유전자(r)가 숨어있을 수 있습니다. 멘델은 완두를
        <strong> 여러 세대 동안 자가수분</strong>하여 유전자가 한 가지로만 고정된 <strong>순종</strong>을 확보한 뒤
        비로소 실험을 시작했습니다.
      </p>

      {/* 🧮 미니 퍼넷 사각형 — 자가수분 1개체의 결과를 직접 검증 */}
      <div style={{
        background: "rgba(0,0,0,0.15)", border: "1px solid rgba(167,139,250,0.18)",
        borderRadius: 12, padding: "14px", marginBottom: 18, textAlign: "center",
      }}>
        <div style={{ fontSize: 11.5, fontWeight: 700, color: "#a78bfa", marginBottom: 4 }}>
          🧮 먼저 손으로 확인해보기 — Rr 한 개체가 자가수분하면?
        </div>
        <div style={{ fontSize: 10, color: "#64748b", marginBottom: 12 }}>
          아래 4칸을 직접 클릭해서 채워보세요. 시뮬레이션이 매 세대 적용하는 계산과 똑같습니다.
        </div>

        <div style={{ display: "flex", justifyContent: "center", marginBottom: 10 }}>
          <div>
            <div style={{ display: "grid", gridTemplateColumns: `42px repeat(2, 1fr)`, gap: 5 }}>
              <div></div>
              {ALLELES2.map(g => (
                <div key={g} style={{
                  width: 46, height: 26, display: "flex", alignItems: "center", justifyContent: "center",
                  background: "rgba(167,139,250,0.12)", border: "1px solid rgba(167,139,250,0.3)",
                  borderRadius: 6, fontSize: 11.5, fontWeight: 700, color: "#c4b5fd",
                }}>♂{g}</div>
              ))}
            </div>
            {ALLELES2.map((rowG, ri) => (
              <div key={rowG} style={{ display: "grid", gridTemplateColumns: `42px repeat(2, 1fr)`, gap: 5, marginTop: 5 }}>
                <div style={{
                  width: 42, height: 46, display: "flex", alignItems: "center", justifyContent: "center",
                  background: "rgba(244,114,182,0.12)", border: "1px solid rgba(244,114,182,0.3)",
                  borderRadius: 6, fontSize: 11.5, fontWeight: 700, color: "#f9a8d4",
                }}>♀{rowG}</div>
                {ALLELES2.map((colG, ci) => {
                  const idx = ri * 2 + ci;
                  const isFilled = pnFilled.includes(idx);
                  const combo = [rowG, colG].sort((a,b)=>a==="R"?-1:1).join("");
                  const round = combo.includes("R");
                  return (
                    <button
                      key={idx}
                      onClick={() => togglePn(idx)}
                      style={{
                        width: 46, height: 46,
                        background: isFilled ? "rgba(255,255,255,0.04)" : "rgba(255,255,255,0.01)",
                        border: isFilled ? "1.5px solid #38bdf8" : "1px solid rgba(80,135,200,0.15)",
                        borderRadius: 6, display: "flex", flexDirection: "column", cursor: "pointer",
                        alignItems: "center", justifyContent: "center", transition: "all 0.2s",
                      }}
                    >
                      {isFilled ? (
                        <>
                          <Pea round={round} neutral size={20} />
                          <GenotypeLabel text={combo} fontSize={8.5} />
                        </>
                      ) : (
                        <div style={{ fontSize: 13, color: "#223b59" }}>?</div>
                      )}
                    </button>
                  );
                })}
              </div>
            ))}
          </div>
        </div>

        {!pnAllDone && (
          <Btn onClick={() => setPnFilled([0,1,2,3])} style={{ background: "rgba(167,139,250,0.18)", color: "#c4b5fd", fontSize: 11, padding: "6px 12px" }}>
            잘 모르겠다면 자동으로 채우기
          </Btn>
        )}

        {pnAllDone && (
          <div style={{
            background: "rgba(56,189,248,0.07)", border: "1px solid rgba(56,189,248,0.2)",
            borderRadius: 8, padding: "9px 12px", fontSize: 11.5, color: "#bae6fd", lineHeight: 1.6,
          }}>
            🎉 RR {pnCounts.RR || 0}칸 · Rr {pnCounts.Rr || 0}칸 · rr {pnCounts.rr || 0}칸 → <strong>1 : 2 : 1</strong> 확인!
            <br />아래 시뮬레이션에서도 Rr 개체마다 이 비율 그대로 적용되어, 세대를 거듭할수록 잡종 비율이 절반씩 줄어듭니다.
          </div>
        )}
      </div>

      {/* 완두콩 풀 시각화 매트릭스 */}
      <div style={{ fontSize: 11, color: "#bae6fd", textAlign: "center", marginBottom: 6 }}>
        {gen === 0 ? "🌱 초기 잡종 집단" : `✨ 현재 비율에 따라 무작위로 뽑은 16개 샘플`}
      </div>
      <div style={{
        display: "grid", gridTemplateColumns: "repeat(8, 1fr)", gap: 8,
        maxWidth: 360, margin: "0 auto 16px", background: "rgba(0,0,0,0.15)",
        padding: 12, borderRadius: 10, transition: "opacity 0.3s", opacity: isAnimate ? 0.4 : 1
      }}>
        {displayPool.map((gt, i) => (
          <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
            <Pea round={gt !== "rr"} neutral size={28} />
            <span style={{ fontSize: 9, fontFamily: "monospace", marginTop: 2, color: gt === "Rr" ? "#a78bfa" : "#fff" }}>
              {gt}
            </span>
          </div>
        ))}
      </div>

      {/* 대시보드 통계 — 전체 집단 비율(%) */}
      <div style={{ fontSize: 11, textAlign: "center", color: "#64748b", marginBottom: 8 }}>
        📊 전체 집단 비율 (해석적 계산값)
      </div>
      <div style={{
        display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10,
        textAlign: "center", maxWidth: 400, margin: "0 auto 14px", fontSize: 11
      }}>
        <div style={{ background: "rgba(255,255,255,0.02)", padding: "6px", borderRadius: 6 }}>
          <div style={{ color: "#fff", fontWeight: 800 }}>{homoPct.toFixed(1)}%</div>
          <div style={{ color: "#64748b", fontSize: 9 }}>둥근 순종 (RR)</div>
        </div>
        <div style={{ background: "rgba(167,139,250,0.05)", padding: "6px", borderRadius: 6, border: "1px solid rgba(167,139,250,0.15)" }}>
          <div style={{ color: "#a78bfa", fontWeight: 800 }}>{hybridPct.toFixed(1)}%</div>
          <div style={{ color: "#7c6aa8", fontSize: 9 }}>둥근 잡종 (Rr)</div>
        </div>
        <div style={{ background: "rgba(255,255,255,0.02)", padding: "6px", borderRadius: 6 }}>
          <div style={{ color: "#4ade80", fontWeight: 800 }}>{homoPct.toFixed(1)}%</div>
          <div style={{ color: "#64748b", fontSize: 9 }}>주름진 순종 (rr)</div>
        </div>
      </div>

      <div style={{ textAlign: "center", marginBottom: 10 }}>
        <div style={{ fontSize: 12, color: "#38bdf8", marginBottom: 6, fontWeight: 700 }}>
          현재 진행 상황: <span style={{ fontFamily: "monospace" }}>{gen}</span>세대 자가수분 완료
        </div>
        {!pnAllDone && gen === 0 && (
          <div style={{ fontSize: 10, color: "#7c6aa8", marginBottom: 8 }}>
            👆 위 퍼넷 사각형을 먼저 채워보면 아래 결과가 왜 이렇게 나오는지 더 잘 이해될 거예요
          </div>
        )}
        <Btn onClick={handleSelfPollination} disabled={stopped} style={{ background: "linear-gradient(135deg,#6366f1,#a78bfa)" }}>
          🔄 현재 개체들끼리 자가수분 시키기 (다음 세대)
        </Btn>
      </div>

      {stopped && (
        <div style={{
          background: "rgba(56,189,248,0.06)", border: "1px solid rgba(56,189,248,0.2)",
          borderRadius: 10, padding: "12px", fontSize: 12, color: "#bae6fd", lineHeight: 1.7, marginTop: 12
        }}>
          🎯 <strong>원리 발견</strong>: 잡종(Rr)의 비율은 매 세대 정확히 <strong>절반씩</strong> 줄어듭니다
          (100% → 50% → 25% → 12.5% → 6.25% → <strong>{hybridPct.toFixed(2)}%</strong>).
          수학적으로는 절반씩 줄 뿐 정확히 0%가 되지는 않지만, {MAX_GEN}세대만 지나도 잡종은
          전체의 {hybridPct.toFixed(1)}%까지 줄어들어 사실상 무시할 수 있는 수준이 됩니다.
          반면 유전자가 고정된 순종(RR과 rr)은 자가수분해도 자기 자신만 낳으므로, 집단은 거의 다
          순종으로 채워집니다.
          <br />이제 충분히 순수한 <strong>순종 둥근 완두(RR)</strong>와 <strong>순종 주름진 완두(rr)</strong>를
          골라 교배 실험을 시작해봅시다.
          <div style={{ textAlign: "center", marginTop: 10 }}>
            <Btn onClick={onComplete} style={{ background: "linear-gradient(135deg,#0ea5e9,#38bdf8)" }}>
              검증 시작: 1막 우열의 원리로 이동 →
            </Btn>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── 1막 교배 애니메이션 ────────────────────────── */
function CrossAnimationMono({ playing, onDone, alleleA, alleleB, colorA, colorB, resultLabel, resultColor }) {
  const [phase, setPhase] = useState(0);
  useEffect(() => {
    if (!playing) { setPhase(0); return; }
    const timers = [
      setTimeout(() => setPhase(1), 60),
      setTimeout(() => setPhase(2), 1000),
      setTimeout(() => { setPhase(3); onDone && onDone(); }, 1900),
    ];
    return () => timers.forEach(clearTimeout);
  }, [playing]);

  const bubbleStyle = (left, opacity) => ({
    position: "absolute", top: "50%", left,
    transform: "translate(-50%,-50%)",
    transition: "left 0.9s cubic-bezier(.4,1.4,.6,1), opacity 0.4s",
    opacity,
  });

  return (
    <div style={{ position: "relative", height: 78, marginTop: 4 }}>
      <div style={bubbleStyle(phase >= 1 ? "46%" : "8%", phase >= 2 ? 0 : 1)}>
        <div style={{
          width: 46, height: 46, borderRadius: "50%",
          background: `linear-gradient(135deg, ${colorA}, ${colorA}cc)`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 13, fontWeight: 800, color: "#1a1a2e", boxShadow: `0 0 14px ${colorA}55`,
        }}>{alleleA}</div>
      </div>
      <div style={bubbleStyle(phase >= 1 ? "54%" : "92%", phase >= 2 ? 0 : 1)}>
        <div style={{
          width: 46, height: 46, borderRadius: "50%",

          <div key={a.n} style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <button
              onClick={() => unlocked && onJump(a.n)}

              style={{

      })}

}

const GAMETES_DI = ["RY", "Ry", "rY", "ry"];
function phenotypeDi(rowG, colG) {
  const alleles = (rowG + colG).split("");
  const R = alleles.filter(a => a === "R" || a === "r");
  const Y = alleles.filter(a => a === "Y" || a === "y");
  const round = R.includes("R");
  const yellow = Y.includes("Y");
  const genotype = R.sort((a,b)=>a==="R"?-1:1).join("") + Y.sort((a,b)=>a==="Y"?-1:1).join("");
  return { round, yellow, genotype };
}

  const harvest = useMemo(() => shuffle([
    ...Array(36).fill({ round: true, yellow: true }),

  const hWrinkledGreen = harvest.filter(h => !h.round && !h.yellow).length;

  const hYellowTotal = hRoundYellow + hWrinkledYellow;

    const c = { roundYellow: 0, roundGreen: 0, wrinkledYellow: 0, wrinkledGreen: 0 };

                          style={{
                            width: 56, height: 56, background: isFilled ? "rgba(255,255,255,0.03)" : "rgba(255,255,255,0.01)",
                            border: isFilled ? "1.5px solid #38bdf8" : "1px solid rgba(80,135,200,0.15)",
                            borderRadius: 6, display: "flex", flexDirection: "column", cursor: "pointer",
                            alignItems: "center", justifyContent: "center", transition: "all 0.2s",
                          }}
                        >
                          {isFilled ? (
                            <>
                              <Pea round={round} yellow={yellow} size={25} />
                              <GenotypeLabel text={genotype} fontSize={8.5} />
                            </>
                          ) : (
                            <div style={{ fontSize: 14, color: "#1e3650" }}>?</div>
                          )}
                        </button>
                      );
                    })}
                  </div>
                ))}
              </div>
            </div>

            <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
              <Btn onClick={() => setFilled(Array.from({ length: 16 }, (_, i) => i))} disabled={allDone} style={{ background: "linear-gradient(135deg,#0ea5e9,#6366f1)" }}>
                ⚡ 매트릭스 전체 채우기
              </Btn>
            </div>
          </div>

          {filled.length > 0 && (
            <div style={{
              background: "rgba(255,255,255,0.018)", border: "1px solid rgba(80,130,200,0.1)",
              borderRadius: 14, padding: "16px", marginBottom: 14,
            }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#7dd3fc", marginBottom: 12, textAlign: "center" }}>
                📊 두 형질 결합 표현형 누적 분리비 (이론치 9 : 3 : 3 : 1)
              </div>
              {PHENO_CONFIG.map(p => {
                const cnt = counts[p.key];
                const pct = (cnt / 16) * 100;
                const expectPct = (p.expect / 16) * 100;
                return (
                  <div key={p.key} style={{ marginBottom: 10 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                      <Pea round={p.round} yellow={p.yellow} size={18} />
                      <span style={{ fontSize: 11, color: "#bae6fd", flex: 1 }}>{p.label}</span>
                      <span style={{ fontFamily: "monospace", fontWeight: 800, fontSize: 12, color: p.color }}>{cnt} / 16 개</span>
                    </div>
                    <div style={{ height: 11, background: "rgba(255,255,255,0.04)", borderRadius: 5, overflow: "hidden", position: "relative" }}>
                      <div style={{ position: "absolute", left: `${expectPct}%`, top: 0, bottom: 0, width: 2, background: "rgba(255,255,255,0.4)", zIndex: 2 }} />
                      <div style={{ height: "100%", width: `${pct}%`, background: p.color, borderRadius: 5, transition: "width 0.3s" }} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {allDone && (
            <div style={{
              background: "linear-gradient(135deg, rgba(250,204,21,0.08), rgba(167,139,250,0.08))",
              border: "1px solid rgba(250,204,21,0.3)", borderRadius: 14, padding: "20px 16px", marginBottom: 14, textAlign: "center",
            }}>
              <div style={{ fontSize: 14, fontWeight: 900, color: "#facc15", marginBottom: 10 }}>
                🎉 양성잡종 독립 분리 교배 스크리닝 완결 (9 : 3 : 3 : 1)
              </div>

              <div style={{ display: "flex", justifyContent: "center", gap: 14, flexWrap: "wrap", marginBottom: 12 }}>
                {PHENO_CONFIG.map(p => (
                  <div key={p.key} style={{ textAlign: "center", background: "rgba(0,0,0,0.2)", padding: "6px 12px", borderRadius: 8 }}>
                    <Pea round={p.round} yellow={p.yellow} size={28} />
                    <div style={{ fontSize: 14, fontWeight: 900, color: p.color, fontFamily: "monospace", marginTop: 2 }}>{counts[p.key]}</div>
                  </div>
                ))}
              </div>

              <div style={{ fontSize: 12, color: "#fde68a", lineHeight: 1.75, textAlign: "left" }}>
                💡 <strong>수학적 확률의 결합 법칙</strong><br />
                두 형질을 따로 분리해 세어보면 <strong>둥근것 : 주름진것 = {roundTotal} : {wrinkledTotal}</strong> 이며,
                <strong> 황색 : 녹색 = {yellowTotal} : {greenTotal}</strong> 이 나와 각각 3:1 비율을 깨끗이 유지합니다.
                <br />앞서 여러분이 직접 발견했듯, 두 쌍의 대립형질이 서로 분리에 간섭을 주지 않으므로 각각의
                분리비 확률이 곱해진 독립 곱사건 결과가 나타나는 것입니다:
                <br /><span style={{ color: "#38bdf8", fontFamily: "monospace" }}>
                  &nbsp;&nbsp;(둥근 모양 3 : 주름진 모양 1) × (노란색 3 : 초록색 1) = 9 : 3 : 3 : 1
                </span>
              </div>

              <div style={{
                marginTop: 12, padding: "12px 13px",
                background: "rgba(0,0,0,0.18)", border: "1px solid rgba(250,204,21,0.18)",
                borderRadius: 10, fontSize: 11.5, color: "#cbd5e1", lineHeight: 1.8, textAlign: "left",
              }}>
                📜 <strong style={{ color: "#facc15" }}>멘델의 실제 실험 데이터 (1865년 논문)</strong><br />
                멘델은 이 두 형질 결합 교배에서 총 <strong>556개</strong>의 완두콩을 수확하여 분류했습니다.
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "4px 14px", marginTop: 6 }}>
                  <span>🟡⭕ 둥글고 황색 <strong style={{ color: "#facc15" }}>315개</strong></span>
                  <span>🟢⭕ 둥글고 녹색 <strong style={{ color: "#4ade80" }}>108개</strong></span>
                  <span>🟡🟫 주름지고 황색 <strong style={{ color: "#fbbf24" }}>101개</strong></span>
                  <span>🟢🟫 주름지고 녹색 <strong style={{ color: "#16a34a" }}>32개</strong></span>
                </div>
                <div style={{ marginTop: 4, fontFamily: "monospace", color: "#86efac" }}>
                  315 : 108 : 101 : 32 ≈ 9.8 : 3.4 : 3.2 : 1 — 이론치인 9:3:3:1 비율이 거의 정확히 성립!
                </div>
              </div>

              <div style={{ marginTop: 14 }}>
                <Btn onClick={onRestart} style={{ background: "transparent", color: "#64748b", border: "1px solid #334155" }}>
                  ↩ 실험실 초기화 후 처음부터 보기
                </Btn>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   메인 컨트롤러
══════════════════════════════════════════════════ */
function App() {
  const [act, setAct] = useState(0);
  const [maxUnlocked, setMaxUnlocked] = useState(0);
  const [resetKey, setResetKey] = useState(0);

  const goAct = n => {
    setAct(n);
    setMaxUnlocked(m => Math.max(m, n));
  };

  const restart = () => {
    setAct(0); setMaxUnlocked(0); setResetKey(k => k + 1);
  };

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(155deg,#06091c 0%,#09132a 55%,#060d1c 100%)",
      color: "#d2e6ff",
      fontFamily: `"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif`,
      padding: "20px 14px 48px", boxSizing: "border-box",
    }}>

      <header style={{ textAlign: "center", marginBottom: 18 }}>
        <div style={{ fontSize: 9, letterSpacing: 5, color: "#38bdf8", fontWeight: 700, marginBottom: 6 }}>
          생식과 유전 · MENDEL INQUIRY LAB
        </div>
        <h1 style={{
          margin: 0, fontSize: 22, fontWeight: 900,
          background: "linear-gradient(90deg,#e4f1ff 0%,#7dd3fc 100%)",
          WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
        }}>
          멘델의 가설 검증 유전 실험실
        </h1>
        <p style={{ margin: "6px 0 0", color: "#4b6a90", fontSize: 12 }}>
          순종 고정 수립부터 가설 설계, 데이터 수집과 과학적 모델 검증까지 — 전 과정을 추적합니다.
        </p>
      </header>

      <ActBreadcrumb act={act} maxUnlocked={maxUnlocked} onJump={goAct} />

      <div key={resetKey}>
        {act === 0 && <Act0PureLine onComplete={() => goAct(1)} />}
        {act === 1 && <Act1Dominance onComplete={() => goAct(2)} />}
        {act === 2 && <Act2Segregation onComplete={() => goAct(3)} />}
        {act === 3 && <Act3Independence onRestart={restart} />}
      </div>

      {/* ── 가설연역 구조 하단 요약판 ───────────────── */}
      <div style={{
        background: "rgba(56,189,248,0.04)", border: "1px solid rgba(56,189,248,0.15)",
        borderRadius: 12, padding: "14px 16px", fontSize: 12, lineHeight: 1.8, color: "#bae6fd", marginTop: 10,
      }}>
        💡 <strong>핵심 가설연역적 탐구 매핑 가이드</strong><br />
        • <strong>0막 순종 분리</strong>: 자가수분을 반복하면 이형접합(Rr) 비율이 매 세대 정확히 절반씩 줄어들어,
        결국 거의 모든 개체가 순종(RR, rr)으로 수렴한다<br />
        • <strong>1막 우열의 원리</strong>: 순종끼리 교배 시 잡종 1대(F1)에선 우성 형질만 발현
        (예외적 현상이 존재하여 최신 과학 교육과정에서는 주로 '원리'로 표기)<br />
        • <strong>2막 분리의 법칙</strong>: 생식세포 형성 시 대립유전자가 쪼개져 각각 분리되어 들어가
        자손 2대(F2)에서 3:1 비율로 열성 재발현<br />
        • <strong>3막 독립의 법칙</strong>: 모양과 색깔 유전자가 독립된 염색체에 존재하여 서로의 분리에
        <strong> 간섭하지 않음</strong> → 개별 분리비의 독립적 곱사건 성립 (9:3:3:1)
      </div>

    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
